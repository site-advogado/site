<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Linha do Tempo | Gestão Jurídica</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    
    <script>  
    tailwind.config = {  
        darkMode: 'class',  
        theme: {  
            extend: {  
                colors: {  
                    pearl: '#FDFCF8',  
                    softBlack: '#1A1A1A',  
                    satinGold: '#C5A059',  
                    darkGold: '#A37E3B'  
                },  
                fontFamily: {  
                    serif: ['Cinzel', 'serif'],  
                    sans: ['Montserrat', 'sans-serif'],  
                }  
            }  
        }  
    }  
    </script>  

    <style>  
        /* 🚫 PROTEÇÕES DE INTERFACE ESTREITAS */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        img { pointer-events: none !important; -webkit-user-drag: none !important; }

        .timeline-line::before {  
            content: '';  
            position: absolute;  
            left: 20px;  
            top: 0;  
            bottom: 0;  
            width: 2px;  
            background: #C5A059;  
            opacity: 0.3;  
        }  
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .modal-blur { backdrop-filter: blur(8px); }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C5A059;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Sincronizando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <div class="flex items-center gap-2">
        <div class="w-8 h-8 gold-gradient rounded-full flex items-center justify-center text-white shadow-md">
            <i class="fas fa-user-shield text-xs"></i>
        </div>
        <span class="font-serif font-bold text-darkGold tracking-widest text-xs uppercase">Área do Cliente</span>
    </div>
    <div class="flex gap-4 items-center">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">  
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>  
        </button>  
        <button onclick="sairTimeline()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-[10px] font-bold hover:bg-red-500 hover:text-white transition-all uppercase">
            Sair
        </button>
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    
    <section id="header-cliente" class="text-center mb-10">
        <h2 class="font-serif text-2xl font-bold text-darkGold uppercase tracking-tighter">Movimentações do Processo</h2>
        <p class="text-xs opacity-60 mt-2">Dados atualizados em tempo real diretamente do tribunal.</p>
    </section>

    <section id="view-timeline" class="space-y-6 relative">  
        <div id="timeline-status-info" class="text-center hidden p-4 rounded-xl bg-gray-200 dark:bg-zinc-800 mb-4 italic text-xs">Este processo foi finalizado e arquivado.</div>  
        <div class="border-l-4 border-satinGold/30 pl-6 ml-2 space-y-8" id="timeline-content">
            </div>  
    </section>  

</main>  

<script>
const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1"; 

// 🚫 PROTEÇÕES EXTREMAS (Copiado das suas referências)
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey && ['c','u','s','p'].includes(e.key.toLowerCase())) ||
        (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) ||
        e.key === "F12") {
        e.preventDefault();
        return false;
    }
});

// Detectar Console Aberto
setInterval(function() {
    if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
        document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:20%;'>Acesso bloqueado por segurança.</h1>";
    }
}, 1000);

function showLoading() { document.getElementById('globalLoader').style.display = 'flex'; }
function hideLoading() { document.getElementById('globalLoader').style.display = 'none'; }

async function getClientIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
    } catch (e) { return "0.0.0.0"; }
}

window.onload = () => {
    carregarTimeline();
};

async function carregarTimeline() {
    showLoading();
    try {
        const ip = await getClientIP();
        const response = await fetch(URL_SCRIPT, {
            method: "POST",
            credentials: "include", // FUNDAMENTAL PARA SEGURANÇA (Envia o Cookie HttpOnly)
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "timeline", ip: ip })
        });
        
        const data = await response.json();
        
        if (data.status === "expirado" || data.status === "erro") {
            sairTimeline();
        } else {
            renderTimeline(data);
        }
    } catch (e) {
        console.error("Erro de conexão");
    } finally {
        hideLoading();
    }
}

function renderTimeline(eventos) {
    const container = document.getElementById('timeline-content');
    container.innerHTML = '';
    
    if(!eventos || eventos.length === 0) {
        container.innerHTML = "<p class='text-center opacity-50'>Nenhuma movimentação encontrada.</p>";
        return;
    }

    [...eventos].reverse().forEach(ev => {
        const isFinalizado = ev.status.toLowerCase().includes("finalizado") || ev.status.toLowerCase().includes("arquivado");
        if(isFinalizado) document.getElementById('timeline-status-info').classList.remove('hidden');

        container.innerHTML += `
            <div class="relative bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold hover:scale-[1.02] transition-transform">
                <div class="absolute -left-[31px] top-6 w-3 h-3 rounded-full bg-satinGold shadow-[0_0_10px_#C5A059]"></div>
                <p class="text-[10px] font-bold text-satinGold uppercase mb-1">${ev.data || ''}</p>
                <h4 class="font-serif font-bold text-lg text-darkGold">${ev.status || ''}</h4>
                <p class="text-sm opacity-80 mt-2 leading-relaxed">${ev.descricao || ''}</p>
            </div>`;
    });
}

function sairTimeline() {
    // A Worker limpará o cookie no logout, mas limpamos o estado local
    window.location.href = "index.html"; 
}

function toggleDarkMode() { 
    document.documentElement.classList.toggle('dark'); 
}
</script>
</body>  
</html>
