<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Linha do Tempo | Gestão Jurídica</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>  
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
        if (localStorage.getItem('ADV_THEME') === 'dark') document.documentElement.classList.add('dark');
    </script>  
    <style>  
        body { -webkit-user-select: none; user-select: none; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #process-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px; scrollbar-width: none; }
        .process-card { flex: 0 0 85%; scroll-snap-align: center; border: 2px solid transparent; transition: 0.3s; }
        .process-card.active { border-color: #C5A059; transform: scale(1.02); }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">  

<div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-xs tracking-widest uppercase">Buscando Processos...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <span class="font-serif font-bold text-darkGold text-xs uppercase tracking-widest">Área do Cliente</span>
    <button onclick="sair()" class="bg-red-500/10 text-red-500 px-4 py-1 rounded-full text-[10px] font-bold uppercase">Sair</button>
</header>  

<main class="pt-24 pb-12 px-4 max-w-lg mx-auto">  
    <section class="text-center mb-6">
        <h2 class="font-serif text-xl font-bold text-darkGold uppercase">Meus Processos</h2>
    </section>

    <div id="process-carousel" class="mb-6"></div>

    <div id="metrics" class="grid grid-cols-1 gap-4 mb-8">
        <div class="bg-white dark:bg-zinc-800 p-6 rounded-[2rem] border border-satinGold/20 text-center shadow-sm">
            <p class="text-[10px] font-bold text-satinGold uppercase mb-1">Status Atual</p>
            <h2 id="client-main-status" class="text-lg font-serif text-darkGold font-bold uppercase">---</h2>
            <div class="w-full bg-gray-100 dark:bg-zinc-700 h-1.5 rounded-full mt-4 overflow-hidden">
                <div id="progress-bar" class="gold-gradient h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="border-l-2 border-satinGold/30 ml-4 space-y-6" id="timeline-content"></div>  
</main>  

<script>
    const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1";
    const MASTER_API_KEY = "Adv_Seguro_2026_##";

    let allProcessData = {};

    function showLoading() { document.getElementById('globalLoader').style.display = 'flex'; }
    function hideLoading() { document.getElementById('globalLoader').style.display = 'none'; }

    window.onload = () => {
        const auth = sessionStorage.getItem('ADV_AUTH_SESS');
        if (!auth) window.location.href = "index.html";
        carregarTimeline();
    };

    async function carregarTimeline() {
        showLoading();
        const email = sessionStorage.getItem('CLIENT_EMAIL');

        try {
            const response = await fetch(URL_SCRIPT, {
                method: 'POST',
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    api_key: MASTER_API_KEY,
                    action: 'timeline',
                    usuario: email
                })
            });
            
            const data = await response.json();
            
            // Verifica se data é um array ou um objeto único e normaliza
            const processos = Array.isArray(data) ? data : (data.numero_processo ? [data] : []);
            
            if (processos.length > 0) {
                organizeData(processos);
            } else {
                document.getElementById('timeline-content').innerHTML = "<p class='text-center opacity-50'>Nenhum processo encontrado para este e-mail.</p>";
            }
        } catch (e) {
            console.error(e);
            alert("Erro ao carregar dados.");
        } finally { hideLoading(); }
    }

    function organizeData(data) {
        allProcessData = {};
        data.forEach(p => {
            allProcessData[p.numero_processo] = p;
        });

        renderCarousel();
        switchProcess(Object.keys(allProcessData)[0]);
    }

    function renderCarousel() {
        const carousel = document.getElementById('process-carousel');
        carousel.innerHTML = '';
        
        Object.keys(allProcessData).forEach(id => {
            const p = allProcessData[id];
            const div = document.createElement('div');
            div.className = 'process-card bg-white dark:bg-zinc-900 p-6 rounded-[2rem] shadow-md cursor-pointer';
            div.id = 'card-' + id.replace(/\s/g, '');
            div.onclick = () => switchProcess(id);
            div.innerHTML = `
                <p class="text-[9px] font-bold text-satinGold uppercase">${p.tipo_acao || 'Ação'}</p>
                <h3 class="font-serif font-bold text-darkGold text-sm truncate uppercase">${id}</h3>
            `;
            carousel.appendChild(div);
        });
    }

    function switchProcess(id) {
        document.querySelectorAll('.process-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-' + id.replace(/\s/g, '')).classList.add('active');

        const proc = allProcessData[id];
        const eventos = proc.atualizacoes || []; // GARANTA QUE O NOME DA CHAVE NO WORKER É 'atualizacoes'
        
        // UI Updates
        document.getElementById('client-main-status').innerText = eventos.length > 0 ? eventos[eventos.length-1].status : "Iniciado";
        
        // Progress Calc
        let progress = 10;
        const lastStatus = (eventos.length > 0 ? eventos[eventos.length-1].status : "").toLowerCase();
        if(lastStatus.includes("sentença")) progress = 70;
        if(lastStatus.includes("finalizado")) progress = 100;
        document.getElementById('progress-bar').style.width = progress + "%";

        // Timeline Render
        const container = document.getElementById('timeline-content');
        container.innerHTML = '';
        [...eventos].reverse().forEach(ev => {
            container.innerHTML += `
                <div class="relative bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-sm border-l-4 border-satinGold mb-4">
                    <p class="text-[9px] font-bold text-satinGold mb-1">${ev.data || ''}</p>
                    <h4 class="font-serif font-bold text-darkGold text-base">${ev.status || ''}</h4>
                    <p class="text-xs opacity-70 mt-2">${ev.descricao || ''}</p>
                </div>
            `;
        });
    }

    function sair() { sessionStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
