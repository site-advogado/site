<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' https://blogger.googleusercontent.com data:; connect-src 'self' https://*.workers.dev;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo | Gestão Jurídica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel','serif'], sans: ['Montserrat','sans-serif'] } } }
    }
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') { document.documentElement.classList.add('dark'); document.documentElement.classList.remove('light'); }
    else { document.documentElement.classList.add('light'); document.documentElement.classList.remove('dark'); }
  </script>
  <style>
    body { -webkit-user-select:none; user-select:none; }
    input,select,textarea { -webkit-user-select:text !important; user-select:text !important; }
    img { pointer-events:none !important; -webkit-user-drag:none !important; }
    .modal-blur { backdrop-filter:blur(8px); }
    .gold-gradient { background:linear-gradient(135deg,#C5A059 0%,#A37E3B 100%); }
    .tab-indicator { transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); }
    .active-tab   { color:#C5A059 !important; opacity:1 !important; }
    .inactive-tab { color:#9ca3af !important; opacity:0.6; }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#C5A059; border-radius:10px; }
    .card-finalizado { filter:grayscale(1); opacity:0.7; background-color:#e5e7eb !important; border-color:#9ca3af !important; }
    .loader { border:4px solid #f3f3f3; border-top:4px solid #C5A059; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    .client-card { transition:all 0.3s ease; }
    .client-card:hover { transform:translateY(-2px); border-color:#C5A059; }
    .layout-list { grid-template-columns:1fr !important; }
    .layout-grid { grid-template-columns:repeat(1,minmax(0,1fr)) !important; }
    @media(min-width:768px){ .layout-grid { grid-template-columns:repeat(2,minmax(0,1fr)) !important; } }
    #modal-success { transition:opacity 0.5s ease-out; }
  </style>
</head>
<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
  <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
    <div class="loader mb-4"></div>
    <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Sincronizando...</p>
  </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 gold-gradient rounded-full flex items-center justify-center text-white shadow-lg"><i class="fas fa-gavel"></i></div>
    <h1 class="font-serif font-bold text-darkGold tracking-tighter hidden sm:block text-xl">PAINEL DE GESTÃO</h1>
  </div>
  <div class="flex gap-2 sm:gap-4 items-center">
    <button onclick="toggleLayout()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all" title="Alternar Layout">
      <i id="layoutIcon" class="fas fa-th-large text-satinGold text-xl"></i>
    </button>
    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">
      <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>
    </button>
    <button onclick="logoutAdmin()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-xs font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">Sair</button>
  </div>
</header>

<main class="pt-28 pb-20 px-4 max-w-4xl mx-auto text-center">
  <div class="relative flex mb-8 bg-gray-100 dark:bg-zinc-900 p-1 rounded-2xl h-14 max-w-4xl mx-auto">
    <div id="tab-pill" class="tab-indicator absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-zinc-800 rounded-xl shadow-sm z-0"></div>
    <button onclick="switchTab('tab-clientes')" id="btn-tab-clientes" class="relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all active-tab">Clientes</button>
    <button onclick="switchTab('tab-perfil')"   id="btn-tab-perfil"   class="relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all inactive-tab">Meu Perfil</button>
  </div>

  <section id="tab-clientes" class="space-y-6 w-full">
    <div class="flex flex-col sm:flex-row gap-4 items-center justify-between max-w-4xl mx-auto">
      <div class="relative w-full sm:w-64">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-satinGold opacity-50"></i>
        <input type="text" id="adminSearch" onkeyup="filterClients()" placeholder="Buscar nome..."
          class="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-zinc-900 border border-satinGold/20 outline-none focus:border-satinGold shadow-sm text-left">
      </div>
      <button onclick="openModalNovoCliente()" class="w-full sm:w-auto gold-gradient text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform text-sm uppercase tracking-widest">
        <i class="fas fa-user-plus mr-2"></i>Novo Cliente
      </button>
    </div>
    <div id="admin-client-list" class="grid grid-cols-1 gap-4 w-full text-center layout-list"></div>
  </section>

  <section id="tab-perfil" class="hidden max-w-4xl mx-auto text-left">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-[30px] shadow-xl border border-satinGold/10 space-y-6">
      <h3 class="font-serif text-3xl text-darkGold border-b border-satinGold/20 pb-4 text-center">Configurações Gerais</h3>
      <div class="space-y-4">
        <label class="text-xs font-bold text-satinGold uppercase tracking-widest">Áreas de Atuação</label>
        <div id="settings-area-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2 p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl border border-satinGold/10"></div>
      </div>
      <div class="pt-6 border-t border-satinGold/20">
        <h3 class="font-serif text-xl text-darkGold mb-6 text-center uppercase tracking-widest">Informações do Consultório</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">Nome Profissional</label><input type="text" id="config-name" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
          <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">Registro OAB</label><input type="text" id="config-oab" oninput="maskOAB(this)" placeholder="OAB/XX 000.000" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
          <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">URL da Foto</label><input type="text" id="config-img" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
          <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">WhatsApp</label><input type="text" id="config-phone" oninput="maskPhone(this)" placeholder="(00) 00000-0000" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
        </div>
        <div class="space-y-2 mt-4"><label class="text-[10px] font-bold text-satinGold uppercase">E-mail Profissional</label><input type="email" id="config-email" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800" placeholder="advocacia@email.com"></div>
        <div class="space-y-2 mt-4"><label class="text-[10px] font-bold text-satinGold uppercase">Breve Biografia</label><textarea id="config-desc" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800 h-24"></textarea></div>
        <div class="pt-6 mt-6 border-t border-satinGold/20 space-y-4">
          <div><label class="text-[10px] font-bold text-satinGold uppercase">Nova Senha Admin</label><input type="password" id="config-pass" class="w-full p-4 rounded-xl border-2 border-satinGold/30 bg-white dark:bg-zinc-800 outline-none mt-1"></div>
          <div><label class="text-[10px] font-bold text-satinGold uppercase">Palavra Secreta</label>
            <div class="relative mt-1">
              <input type="password" id="config-secret" class="w-full p-4 rounded-xl border-2 border-satinGold/30 bg-pearl dark:bg-zinc-800 font-bold" readonly value="••••••••">
              <div class="absolute right-4 top-1/2 -translate-y-1/2"><input type="checkbox" id="check-change-secret" onchange="toggleNewSecretField()" class="w-5 h-5 accent-satinGold"></div>
            </div>
          </div>
          <div id="container-new-secret" class="hidden"><label class="text-[10px] font-bold text-darkGold uppercase">Nova Palavra Secreta</label><input type="text" id="config-new-secret" class="w-full p-4 rounded-xl border-2 border-darkGold bg-white dark:bg-zinc-900 outline-none mt-1"></div>
          <button onclick="triggerConfirm('perfil')" class="w-full gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl uppercase tracking-widest hover:scale-[1.01] transition-transform mt-2">Salvar Alterações</button>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Modal Novo Cliente -->
<div id="modal-client" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/60">
  <div class="bg-pearl dark:bg-zinc-900 w-full max-w-xl p-8 rounded-[40px] border border-satinGold/30 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-serif text-3xl text-darkGold uppercase tracking-widest">Novo Registro</h3>
      <button onclick="closeModal('modal-client')" class="text-satinGold opacity-50 hover:opacity-100"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 text-left">
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">Nome do Reclamante</label><input type="text" id="c-nome" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">E-mail para Login</label><input type="email" id="c-email" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 text-left">
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">Tipo de Ação</label><select id="c-tipo-acao" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800 text-sm font-semibold"></select></div>
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">N. Processo (ID)</label><input type="text" id="c-num-proc" oninput="maskProcess(this)" placeholder="0000000-00.0000.0.00.0000" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
    </div>
    <div class="bg-gray-50 dark:bg-zinc-800/50 p-6 rounded-3xl border border-satinGold/20 space-y-4 text-left">
      <div class="flex items-center justify-between">
        <label class="text-sm font-bold text-satinGold uppercase tracking-widest">Status Inicial</label>
        <div class="flex items-center gap-2"><input type="checkbox" id="c-notificar" class="accent-satinGold" checked><label for="c-notificar" class="text-[10px] font-bold opacity-70 uppercase">Notificar e-mail</label></div>
      </div>
      <select id="a-status" class="w-full p-4 mb-4 rounded-xl border-2 border-satinGold/30 dark:bg-zinc-900 font-bold text-sm">
        <option>Petição Inicial Protocolada</option><option>Aguardando Citação</option>
        <option>Audiência de Conciliação Designada</option><option>Audiência de Instrução e Julgamento</option>
        <option>Sentença Proferida</option><option>Fase de Execução / Cálculos</option>
        <option>Processo Finalizado / Arquivado</option>
      </select>
      <textarea id="a-desc" placeholder="Descreva os detalhes iniciais..." class="w-full p-4 rounded-xl border border-satinGold/20 dark:bg-zinc-900 h-32 text-sm"></textarea>
    </div>
    <div class="flex gap-3 mt-8">
      <button onclick="closeModal('modal-client')" class="flex-1 py-4 font-bold opacity-50 text-[10px] uppercase">Cancelar</button>
      <button onclick="triggerConfirm('cliente_novo')" class="flex-1 gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl text-[10px] uppercase">Salvar Registro</button>
    </div>
  </div>
</div>

<!-- Modal Editar Cliente -->
<div id="modal-edit-client" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/60">
  <div class="bg-pearl dark:bg-zinc-900 w-full max-w-xl p-8 rounded-[40px] border border-satinGold/30 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-serif text-3xl text-darkGold uppercase tracking-widest">Editar Registro</h3>
      <button onclick="closeModal('modal-edit-client')" class="text-satinGold opacity-50 hover:opacity-100"><i class="fas fa-times text-xl"></i></button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 text-left">
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">Nome do Reclamante</label><input type="text" id="edit-c-nome" readonly class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800 bg-gray-100 opacity-70"></div>
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">E-mail do Cliente</label><input type="email" id="edit-c-email" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 text-left">
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">N. Processo (ID)</label><input type="text" id="edit-c-num-proc" readonly class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800 bg-gray-100 opacity-70"></div>
      <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">Observação (Coluna Q)</label><input type="text" id="edit-c-obs" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800" placeholder="Ex: Audiência 20/05"></div>
    </div>
    <div class="bg-gray-50 dark:bg-zinc-800/50 p-6 rounded-3xl border border-satinGold/20 space-y-4 text-left">
      <div class="flex items-center justify-between gap-2 mb-2">
        <div class="flex items-center gap-2"><input type="checkbox" id="edit-add-new-card-check" class="w-4 h-4 accent-satinGold" onchange="toggleEditUI()"><label class="text-[10px] font-bold uppercase text-satinGold">Novo Card</label></div>
        <div class="flex items-center gap-2"><input type="checkbox" id="edit-notificar" class="accent-satinGold"><label for="edit-notificar" class="text-[10px] font-bold opacity-70 uppercase">Notificar e-mail</label></div>
      </div>
      <select id="edit-a-status" class="w-full p-4 mb-4 rounded-xl border-2 border-satinGold/30 dark:bg-zinc-900 font-bold text-sm">
        <option>Petição Inicial Protocolada</option><option>Aguardando Citação</option>
        <option>Audiência de Conciliação Designada</option><option>Audiência de Instrução e Julgamento</option>
        <option>Sentença Proferida</option><option>Fase de Execução / Cálculos</option>
        <option>Processo Finalizado / Arquivado</option>
      </select>
      <textarea id="edit-a-desc" placeholder="Descreva os detalhes..." class="w-full p-4 rounded-xl border border-satinGold/20 dark:bg-zinc-900 h-32 text-sm"></textarea>
    </div>
    <div class="flex gap-3 mt-8">
      <button onclick="closeModal('modal-edit-client')" class="flex-1 py-4 font-bold opacity-50 text-[10px] uppercase">Cancelar</button>
      <button onclick="triggerConfirm('cliente_editar')" class="flex-1 gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl text-[10px] uppercase">Atualizar Dados</button>
    </div>
  </div>
</div>

<!-- Modal Confirmação -->
<div id="modal-confirm" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 modal-blur bg-black/80">
  <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-[30px] border-2 border-satinGold text-center shadow-2xl">
    <div class="w-16 h-16 gold-gradient rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4"><i class="fas fa-question"></i></div>
    <h3 class="font-serif text-xl text-darkGold mb-2 uppercase tracking-widest">Confirmar?</h3>
    <p class="text-sm opacity-70 mb-8">Deseja aplicar estas alterações?</p>
    <div class="flex gap-3">
      <button onclick="closeModal('modal-confirm')" class="flex-1 py-3 text-xs font-bold uppercase opacity-50">Não</button>
      <button id="btn-confirm-yes" class="flex-1 gold-gradient text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">Sim</button>
    </div>
  </div>
</div>

<!-- Modal Excluir -->
<div id="modal-delete-confirm" class="fixed inset-0 z-[250] hidden flex items-center justify-center p-4 modal-blur bg-black/80">
  <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-[30px] border-2 border-satinGold text-center shadow-2xl">
    <div class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg"><i class="fas fa-exclamation-triangle"></i></div>
    <h3 class="font-serif text-xl text-red-600 mb-2 uppercase font-bold tracking-widest">ATENÇÃO!</h3>
    <p class="text-sm opacity-80 mb-8">Irá apagar todas as informações do cliente permanentemente. Deseja continuar?</p>
    <div class="flex gap-3">
      <button onclick="closeModal('modal-delete-confirm')" class="flex-1 py-3 text-xs font-bold uppercase opacity-50">Cancelar</button>
      <button id="btn-confirm-delete" class="flex-1 gold-gradient text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">Sim, Excluir</button>
    </div>
  </div>
</div>

<!-- Modal Sucesso -->
<div id="modal-success" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 modal-blur bg-black/60 opacity-0 pointer-events-none transition-opacity duration-500">
  <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-10 rounded-[30px] border-2 border-satinGold text-center shadow-2xl">
    <div class="w-20 h-20 gold-gradient rounded-full flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-lg"><i class="fas fa-check"></i></div>
    <h3 class="font-serif text-2xl text-darkGold mb-2 uppercase font-bold tracking-widest">Sucesso!</h3>
    <p class="text-sm opacity-80 mb-10">Dados processados com sucesso.</p>
  </div>
</div>

<script>
  const URL_API    = 'https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1';
  const URL_SESSAO = 'https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/verificar-sessao';
  let dbClients = [], currentClientID = '';

  const AREAS_DIREITO = ['Direito Trabalhista','Direito da Família','Direito Previdenciário','Direito do Consumidor','Direito Imobiliário','Direito Tributário','Direito Penal / Criminal','Direito Sucessório','Direito Digital','Direito Empresarial'];

  function maskProcess(i) { let v=i.value.replace(/\D/g,''); if(v.length>20)v=v.substring(0,20); v=v.replace(/^(\d{7})(\d)/,'$1-$2').replace(/-(\d{2})(\d)/,'-$1.$2').replace(/\.(\d{4})(\d)/,'.$1.$2').replace(/\.(\d{1})(\d)/,'.$1.$2').replace(/\.(\d{2})(\d)/,'.$1.$2'); i.value=v; }
  function maskPhone(i)   { let v=i.value.replace(/\D/g,''); if(v.length>11)v=v.substring(0,11); v=v.replace(/^(\d{2})(\d)/g,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); i.value=v; }
  function maskOAB(i)     { let v=i.value.toUpperCase(); if(!v.startsWith('OAB/'))v='OAB/'; let p=v.split('/'),c=p[1]||''; c=c.replace(/[^A-Z0-9]/g,''); let s=c.substring(0,2).replace(/[0-9]/g,''),n=c.substring(s.length).replace(/\D/g,''); if(n.length>6)n=n.substring(0,6); if(n.length>3)n=n.replace(/^(\d{3})(\d)/,'$1.$2'); i.value='OAB/'+s+(n?' '+n:''); }
  function validateEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e).toLowerCase()); }
  function showSinc(){ document.getElementById('globalLoader').classList.replace('hidden','flex'); }
  function hideSinc(){ document.getElementById('globalLoader').classList.replace('flex','hidden'); }
  function openModal(id){ document.getElementById(id).classList.replace('hidden','flex'); }
  function closeModal(id){ document.getElementById(id).classList.replace('flex','hidden'); }

  async function init() {
    showSinc();
    try {
      const res  = await fetch(URL_SESSAO, { method:'GET', credentials:'include' });
      const data = await res.json();
      if (!data.autenticado || data.role !== 'admin') { window.location.href='index.html'; return; }
    } catch { window.location.href='index.html'; return; }
    finally { hideSinc(); }

    const savedLayout = localStorage.getItem('ADMIN_LAYOUT')||'list';
    const list = document.getElementById('admin-client-list');
    const icon = document.getElementById('layoutIcon');
    if (savedLayout==='grid') { list.classList.replace('layout-list','layout-grid'); icon.classList.replace('fa-th-large','fa-list'); }

    const isDark = localStorage.getItem('ADV_GLOBAL_THEME')==='dark';
    if (isDark) document.getElementById('themeIcon').classList.replace('fa-moon','fa-sun');

    initAreaSettings();
    carregarPerfil();
    carregarClientes();
  }

  function initAreaSettings() {
    const c = document.getElementById('settings-area-list');
    c.innerHTML = AREAS_DIREITO.map(a=>`<label class="flex items-center gap-3 p-2 hover:bg-gray-100 dark:hover:bg-zinc-700 rounded-lg cursor-pointer transition-all"><input type="checkbox" value="${a}" class="settings-area-check accent-satinGold w-4 h-4"><span class="text-[10px] font-bold uppercase opacity-80">${a}</span></label>`).join('');
  }

  function updateModalAreaSelect(areasString) {
    const select = document.getElementById('c-tipo-acao');
    const areas  = areasString ? areasString.split('|') : AREAS_DIREITO;
    select.innerHTML = '';
    areas.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; select.appendChild(o); });
  }

  function carregarPerfil() {
    showSinc();
    fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'bio'}) })
    .then(r=>r.json()).then(data=>{
      document.getElementById('config-name').value  = data.name           || '';
      document.getElementById('config-oab').value   = data.oab            || '';
      document.getElementById('config-img').value   = data.img            || '';
      document.getElementById('config-phone').value = data.phone          || '';
      document.getElementById('config-email').value = data.email_advogada || '';
      document.getElementById('config-desc').value  = data.desc           || '';
      const av = data.areas_visiveis || '';
      document.querySelectorAll('.settings-area-check').forEach(ck=>{ ck.checked=av.split('|').includes(ck.value); });
      updateModalAreaSelect(av);
      sessionStorage.setItem('ADV_AREAS_SYNC', av);
    }).finally(hideSinc);
  }

  function carregarClientes() {
    showSinc();
    fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'listar_clientes'}) })
    .then(r=>r.json()).then(data=>{ dbClients=Array.isArray(data)?data:[]; renderClients(); }).finally(hideSinc);
  }

  function renderClients() {
    const list   = document.getElementById('admin-client-list');
    const search = document.getElementById('adminSearch').value.toLowerCase();
    list.innerHTML = '';
    [...dbClients].filter(c=>(c.nome||'').toLowerCase().includes(search)).reverse().forEach(c=>{
      const tlRev = Array.isArray(c.timeline)?[...c.timeline].reverse():[];
      const ultimo = tlRev[0];
      const fin    = ultimo && (ultimo.status||'').includes('Finalizado');

      const card = document.createElement('div');
      card.className = `bg-white dark:bg-zinc-900 p-6 rounded-[25px] border border-satinGold/10 client-card shadow-sm flex justify-between items-center text-left${fin?' card-finalizado':''}`;

      const info = document.createElement('div');
      const h4   = document.createElement('h4'); h4.className='font-bold text-darkGold text-lg mb-0.5 uppercase'; h4.textContent=c.nome||'';
      const meta = document.createElement('div'); meta.className='flex items-center gap-2 mb-1';
      const tSpan= document.createElement('span'); tSpan.className='text-[10px] font-bold text-satinGold uppercase bg-satinGold/10 px-2 py-0.5 rounded-full'; tSpan.textContent=c.tipo_acao||'Ação';
      const pSpan= document.createElement('span'); pSpan.className='text-[10px] opacity-50 font-bold'; pSpan.textContent=c.numero_processo||'S/N';
      meta.append(tSpan,pSpan);
      const sP   = document.createElement('p'); sP.className='text-[11px] uppercase font-bold text-softBlack dark:text-pearl tracking-wider leading-tight'; sP.textContent=ultimo?ultimo.status:'Sem Status';
      info.append(h4,meta,sP);

      const acts = document.createElement('div'); acts.className='flex gap-2 flex-shrink-0';
      const eBtn = document.createElement('button'); eBtn.className='w-10 h-10 rounded-full bg-gray-100 dark:bg-zinc-800 text-satinGold hover:bg-satinGold hover:text-white transition-all shadow-sm flex items-center justify-center'; eBtn.innerHTML='<i class="fas fa-pen text-sm"></i>'; eBtn.addEventListener('click',()=>openEditClient(c.id));
      const dBtn = document.createElement('button'); dBtn.className='w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/20 text-red-400 hover:bg-red-500 hover:text-white transition-all shadow-sm flex items-center justify-center'; dBtn.innerHTML='<i class="fas fa-trash-alt text-sm"></i>'; dBtn.addEventListener('click',()=>deleteClient(c.id));
      acts.append(eBtn,dBtn);
      card.append(info,acts);
      list.appendChild(card);
    });
  }

  function openModalNovoCliente() {
    ['c-nome','c-email','c-num-proc','a-desc'].forEach(id=>{ document.getElementById(id).value=''; });
    document.getElementById('a-status').value='Petição Inicial Protocolada';
    document.getElementById('c-notificar').checked=true;
    updateModalAreaSelect(sessionStorage.getItem('ADV_AREAS_SYNC'));
    openModal('modal-client');
  }

  async function saveNewClient() {
    const email = document.getElementById('c-email').value;
    if(!validateEmail(email)) return alert('E-mail inválido.');
    showSinc();
    try {
      const res = await fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'save_client', nome:document.getElementById('c-nome').value, email, notificar:document.getElementById('c-notificar').checked?'SIM':'NAO', status:document.getElementById('a-status').value, descricao:document.getElementById('a-desc').value, numero_processo:document.getElementById('c-num-proc').value, tipo_acao:document.getElementById('c-tipo-acao').value, obs:'' }) });
      const r = await res.json();
      if(r.status==='ok'){ closeModal('modal-client'); showQuickSuccess(); carregarClientes(); }
    } catch(e){ console.error(e); } finally { hideSinc(); }
  }

  function openEditClient(id) {
    const c = dbClients.find(x=>String(x.id)===String(id));
    if(!c) return;
    currentClientID = String(c.id);
    document.getElementById('edit-c-nome').value      = c.nome            || '';
    document.getElementById('edit-c-num-proc').value  = c.numero_processo || '';
    document.getElementById('edit-c-email').value     = c.email           || '';
    document.getElementById('edit-c-obs').value       = c.obs             || '';
    document.getElementById('edit-notificar').checked = c.notificar==='SIM';
    const last = Array.isArray(c.timeline)&&c.timeline.length>0 ? c.timeline[c.timeline.length-1] : {status:'Petição Inicial Protocolada',descricao:''};
    document.getElementById('edit-a-status').value = last.status    || '';
    document.getElementById('edit-a-desc').value   = last.descricao || '';
    document.getElementById('edit-add-new-card-check').checked = false;
    openModal('modal-edit-client');
  }

  function toggleEditUI() {
    const isNew = document.getElementById('edit-add-new-card-check').checked;
    const c     = dbClients.find(x=>String(x.id)===currentClientID);
    if(!c||!Array.isArray(c.timeline)) return;
    const last = c.timeline[c.timeline.length-1]||{status:'',descricao:''};
    document.getElementById('edit-a-status').value = isNew?'Petição Inicial Protocolada':(last.status||'');
    document.getElementById('edit-a-desc').value   = isNew?'':(last.descricao||'');
  }

  async function updateExistingClient() {
    const email = document.getElementById('edit-c-email').value;
    if(!validateEmail(email)) return alert('E-mail inválido.');
    showSinc();
    try {
      const res = await fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'update_client_timeline', id:currentClientID, email, obs:document.getElementById('edit-c-obs').value, notificar:document.getElementById('edit-notificar').checked?'SIM':'NAO', status_atual:document.getElementById('edit-a-status').value, novo_texto:document.getElementById('edit-a-desc').value, is_new_card:document.getElementById('edit-add-new-card-check').checked }) });
      const r = await res.json();
      if(r.status==='ok'){ closeModal('modal-edit-client'); showQuickSuccess(); carregarClientes(); }
    } catch(e){ console.error(e); } finally { hideSinc(); }
  }

  function deleteClient(id) {
    openModal('modal-delete-confirm');
    document.getElementById('btn-confirm-delete').onclick = async () => {
      closeModal('modal-delete-confirm'); showSinc();
      try {
        const res = await fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'delete_client',id:String(id)}) });
        const r   = await res.json();
        if(r.status==='ok') carregarClientes();
      } catch(e){ console.error(e); } finally { hideSinc(); }
    };
  }

  async function saveProfileData() {
    const email = document.getElementById('config-email').value;
    if(!validateEmail(email)) return alert('E-mail inválido.');
    showSinc();
    const visible = Array.from(document.querySelectorAll('.settings-area-check:checked')).map(c=>c.value).join('|');
    try {
      await fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'save_profile', name:document.getElementById('config-name').value, oab:document.getElementById('config-oab').value, img:document.getElementById('config-img').value, phone:document.getElementById('config-phone').value, email, desc:document.getElementById('config-desc').value, new_pass:document.getElementById('config-pass').value||null, new_secret:document.getElementById('check-change-secret').checked?document.getElementById('config-new-secret').value:null, areas_visiveis:visible }) });
      sessionStorage.setItem('ADV_AREAS_SYNC',visible);
      showQuickSuccess();
    } catch(e){ console.error(e); } finally { hideSinc(); }
  }

  async function logoutAdmin() {
    showSinc();
    try { await fetch(URL_API,{ method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'logout'}) }); } catch{ /* best-effort */ }
    window.location.href='index.html';
  }

  function showQuickSuccess() {
    const m = document.getElementById('modal-success');
    m.classList.replace('hidden','flex');
    setTimeout(()=>{ m.style.opacity='1'; },10);
    setTimeout(()=>{ m.style.opacity='0'; setTimeout(()=>m.classList.replace('flex','hidden'),500); },1200);
  }

  function filterClients(){ renderClients(); }
  function toggleLayout() {
    const list=document.getElementById('admin-client-list'),icon=document.getElementById('layoutIcon');
    if(list.classList.contains('layout-list')){ list.classList.replace('layout-list','layout-grid'); localStorage.setItem('ADMIN_LAYOUT','grid'); icon.classList.replace('fa-th-large','fa-list'); }
    else { list.classList.remove('layout-grid'); list.classList.add('layout-list'); localStorage.setItem('ADMIN_LAYOUT','list'); icon.classList.replace('fa-list','fa-th-large'); }
  }
  function toggleDarkMode() {
    const isDark=document.documentElement.classList.toggle('dark');
    localStorage.setItem('ADV_GLOBAL_THEME',isDark?'dark':'light');
    document.getElementById('themeIcon').classList.replace(isDark?'fa-moon':'fa-sun',isDark?'fa-sun':'fa-moon');
  }
  function switchTab(tabId) {
    const isC=tabId==='tab-clientes';
    document.getElementById('tab-pill').style.transform=isC?'translateX(0)':'translateX(100%)';
    document.getElementById('tab-clientes').classList.toggle('hidden',!isC);
    document.getElementById('tab-perfil').classList.toggle('hidden',isC);
    document.getElementById('btn-tab-clientes').className=`relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${isC?'active-tab':'inactive-tab'}`;
    document.getElementById('btn-tab-perfil').className=`relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${!isC?'active-tab':'inactive-tab'}`;
  }
  function triggerConfirm(tipo) {
    openModal('modal-confirm');
    document.getElementById('btn-confirm-yes').onclick=()=>{ closeModal('modal-confirm'); if(tipo==='perfil')saveProfileData(); if(tipo==='cliente_novo')saveNewClient(); if(tipo==='cliente_editar')updateExistingClient(); };
  }
  function toggleNewSecretField(){ document.getElementById('container-new-secret').classList.toggle('hidden',!document.getElementById('check-change-secret').checked); }

  window.addEventListener('DOMContentLoaded',()=>{
    const isDark=localStorage.getItem('ADV_GLOBAL_THEME')==='dark';
    if(isDark) document.getElementById('themeIcon').classList.replace('fa-moon','fa-sun');
    init();
  });
</script>
</body>
</html>
