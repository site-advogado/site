<!DOCTYPE html>  
<html lang="pt-br" class="light"> 
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Gestão Jurídica | Home</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    </script>
    <style>
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen transition-colors duration-300">

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="loader"></div>
</div>

<main class="pt-20 px-4 max-w-lg mx-auto">
    <section id="view-bio" class="text-center mb-10">
        <img id="bio-img" src="" class="w-32 h-32 mx-auto rounded-full border-4 border-satinGold mb-4 object-cover">
        <h1 id="bio-name" class="font-serif text-2xl font-bold text-darkGold uppercase">Carregando...</h1>
        <p id="bio-oab" class="text-xs opacity-60 mb-4"></p>
        <p id="bio-desc" class="text-sm italic mb-6"></p>
        <div class="flex justify-center gap-4 text-satinGold">
            <a id="bio-phone" href="#"><i class="fab fa-whatsapp text-2xl"></i></a>
            <a id="bio-email" href="#"><i class="fas fa-envelope text-2xl"></i></a>
        </div>
    </section>

    <section class="bg-white dark:bg-zinc-900 p-8 rounded-[30px] shadow-lg border border-satinGold/10">
        <h3 class="font-serif text-xl mb-6 text-center">Consultar Processo</h3>
        <input type="email" id="searchCpf" placeholder="Seu e-mail" class="w-full bg-transparent border-b-2 border-satinGold/30 py-3 outline-none focus:border-satinGold mb-6">
        <button onclick="handleClientSearch()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-md uppercase text-xs">Acessar</button>
    </section>
</main>

<div id="modalCode" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-[30px] w-full max-w-xs text-center">
        <h3 class="font-serif text-lg text-darkGold mb-4">VERIFICAÇÃO</h3>
        <input type="text" id="inputOtp" maxlength="6" class="w-full text-center text-2xl font-bold border-b-2 border-satinGold outline-none mb-6 bg-transparent">
        <button onclick="confirmCode()" class="w-full gold-gradient text-white py-3 rounded-xl font-bold text-xs uppercase">Validar</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1";

    function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
    function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

    async function fetchBio() {
        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                credentials: "include",
                body: JSON.stringify({ action: "bio" })
            });
            const data = await res.json();
            if (data.status === "sucesso") {
                document.getElementById('bio-name').innerText = data.name;
                document.getElementById('bio-oab').innerText = data.oab;
                document.getElementById('bio-desc').innerText = data.desc;
                document.getElementById('bio-img').src = data.img;
                document.getElementById('bio-phone').href = `https://wa.me/55${data.phone.replace(/\D/g,'')}`;
                document.getElementById('bio-email').href = `mailto:${data.email_advogada}`;
            }
        } catch (e) { console.error(e); }
        finally { hideLoading(); }
    }

    async function handleClientSearch() {
        const user = document.getElementById('searchCpf').value.trim();
        if (!user) return alert("Digite seu e-mail");
        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                credentials: "include",
                body: JSON.stringify({ action: "login", usuario: user, passo: "solicitar" })
            });
            const data = await res.json();
            if (data.status === "abrir_modal_admin") {
                document.body.insertAdjacentHTML('beforeend', data.html);
                document.getElementById('modalAdmin').classList.replace('hidden', 'flex');
            } else {
                document.getElementById('modalCode').classList.replace('hidden', 'flex');
            }
        } catch (e) { alert("Erro de conexão"); }
        finally { hideLoading(); }
    }

    async function confirmCode() {
        const user = document.getElementById('searchCpf').value.trim();
        const code = document.getElementById('inputOtp').value.trim();
        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                credentials: "include",
                body: JSON.stringify({ action: "login", usuario: user, codigo: code, passo: "verificar" })
            });
            const data = await res.json();
            if (data.status === "ok") {
                localStorage.setItem('ADV_USER_EMAIL', user);
                window.location.href = "linha-tempo.html";
            } else { alert("Código inválido"); }
        } catch (e) { alert("Erro"); }
        finally { hideLoading(); }
    }

    async function realizarLoginAdmin() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                credentials: "include",
                body: JSON.stringify({ action: "login", usuario: user, senha: pass })
            });
            const data = await res.json();
            if (data.status === "sucesso") {
                sessionStorage.setItem('ADV_AUTH_SESS', 'true');
                window.location.href = "configuracao.html";
            } else { alert("Acesso negado"); }
        } catch (e) { alert("Erro"); }
        finally { hideLoading(); }
    }

    window.onload = fetchBio;
</script>
</body>
</html>
