<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Jurídico - Acesso Restrito</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin-bottom: 1rem; padding: 0.5rem; }
        button { width: 100%; padding: 0.7rem; background: #1a1a1a; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login Administrativo</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
        <p id="msg"></p>
    </div>

    <script>
        const URL_WORKER = "SUA_URL_DA_CLOUDFLARE_AQUI";

        async function fazerLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('msg');

            msg.innerText = "Verificando...";

            try {
                const response = await fetch(URL_WORKER, {
                    method: "POST",
                    // IMPORTANTE: credentials "include" permite o envio e recebimento de cookies
                    credentials: "include",
                    body: JSON.stringify({
                        action: "login",
                        usuario: user,
                        senha: pass
                    }),
                    headers: { "Content-Type": "application/json" }
                });

                const data = await response.json();

                if (data.status === "sucesso") {
                    msg.innerText = "Login realizado! Redirecionando...";
                    // O Token já está salvo no Cookie HTTPOnly pelo navegador
                    setTimeout(() => {
                        window.location.href = "dashboard.html"; 
                    }, 1000);
                } else {
                    msg.innerText = "Erro: " + data.message;
                }
            } catch (error) {
                msg.innerText = "Erro na conexão com o servidor.";
            }
        }

        // Exemplo de como você chamaria qualquer outra função após o login
        async function buscarDados() {
            const response = await fetch(URL_WORKER, {
                method: "POST",
                credentials: "include", // O navegador enviará o cookie automaticamente
                body: JSON.stringify({ action: "get_processos" })
            });
            return await response.json();
        }
    </script>
</body>
</html>
