<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Advocacia">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3503/3503567.png">

    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dra. Nome da Advogada | Gestão Processual</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    
    <script>  
    tailwind.config = {  
        darkMode: 'class',  
        theme: {  
            extend: {  
                colors: {  
                    pearl: '#FDFCF8',  
                    softBlack: '#1A1A1A',  
                    satinGold: '#C5A059',  
                    darkGold: '#A37E3B'  
                },  
                fontFamily: {  
                    serif: ['Cinzel', 'serif'],  
                    sans: ['Montserrat', 'sans-serif'],  
                }  
            }  
        }  
    }  
    </script>  

    <style>  
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
input, select, textarea {
    -webkit-user-select: text !important;
    -moz-user-select: text !important;
    -ms-user-select: text !important;
    user-select: text !important;
}
img {
    pointer-events: none !important;
    -webkit-user-drag: none !important;
}
.timeline-line::before {  
    content: '';  
    position: absolute;  
    left: 20px;  
    top: 0;  
    bottom: 0;  
    width: 2px;  
    background: #C5A059;  
    opacity: 0.3;  
}  
.modal-blur { backdrop-filter: blur(8px); }  
.gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
.finished-card { filter: grayscale(1); opacity: 0.7; border-color: #666 !important; }  
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <button id="installApp" class="hidden bg-satinGold hover:bg-darkGold text-white px-4 py-2 rounded-full text-[10px] font-bold transition-all shadow-lg animate-bounce">  
        <i class="fas fa-download mr-2"></i>BAIXAR APP  
    </button>  
    <div class="flex gap-4 items-center ml-auto">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">  
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>  
        </button>  
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6">  
            <img id="bio-img" src="" alt="" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl">  
        </div>  
        <h1 id="bio-name">Carregando...</h1>  
        <p id="bio-oab"></p>  
        <p id="bio-desc"></p>  
        <div>
            <a id="bio-phone"></a>  
            <a id="bio-email"></a>  
        </div>
    </section>  

    <section id="view-client-search">  
        <input type="email" id="searchCpf">  
        <button onclick="handleClientSearch()" id="btnSearch">ACESSAR</button>  
    </section>  

    <section id="view-timeline" class="hidden">  
        <div id="timeline-content"></div>  
    </section>  
</main>  

<script>

const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1"; 
const API_KEY = "ADV_SISTEMA_SEGURO_2026_X9";

let CURRENT_IP = "0.0.0.0";

async function getClientIP() {
    try {
        const r = await fetch('https://api.ipify.org?format=json');
        const d = await r.json();
        return d.ip;
    } catch { return "0.0.0.0"; }
}

window.onload = () => { fetchBio(); };

function fetchBio() {  
    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "bio", api_key: API_KEY })
    })  
    .then(res => res.json())  
    .then(data => {  
        document.getElementById('bio-name').innerText = data.name || "";
    });
}  

async function handleClientSearch() {  
    const inputUsuario = document.getElementById('searchCpf').value.trim();  
    CURRENT_IP = await getClientIP();

    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "login",
            usuario: inputUsuario,
            passo: "solicitar",
            ip: CURRENT_IP,
            api_key: API_KEY
        })
    })
    .then(res => res.json())
    .then(response => console.log(response));
}

async function confirmCode() {
    const email = document.getElementById('searchCpf').value.trim();
    const res = await fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            action: "login",
            usuario: email,
            codigo: "000000",
            passo: "verificar",
            ip: CURRENT_IP,
            api_key: API_KEY
        })
    });
}

async function carregarTimeline() {
    const ip = await getClientIP();
    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            action: "timeline",
            ip: ip,
            api_key: API_KEY
        })
    })
    .then(res => res.json())
    .then(data => console.log(data));
}

</script>
</body>  
</html>
