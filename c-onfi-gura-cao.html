<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Gestão Jurídica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pearl: '#FDFCF8',
                        softBlack: '#1A1A1A',
                        satinGold: '#C5A059',
                        darkGold: '#A37E3B'
                    },
                    fontFamily: {
                        serif: ['Cinzel', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .modal-blur { backdrop-filter: blur(8px); }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
        .client-card { transition: all 0.3s ease; }
        .client-card:hover { transform: translateY(-2px); border-color: #C5A059; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
    </style>
</head>

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 gold-gradient rounded-full flex items-center justify-center text-white shadow-lg">
            <i class="fas fa-gavel"></i>
        </div>
        <h1 class="font-serif font-bold text-darkGold tracking-tighter hidden sm:block">PAINEL DE GESTÃO</h1>
    </div>
    
    <div class="flex gap-4 items-center">
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>
        </button>
        <button onclick="logoutAdmin()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-xs font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">
            Sair
        </button>
    </div>
</header>

<main class="pt-24 pb-20 px-4 max-w-4xl mx-auto">
    
    <div class="flex gap-2 mb-8 bg-gray-100 dark:bg-zinc-900 p-1 rounded-2xl">
        <button onclick="switchTab('tab-clientes')" id="btn-tab-clientes" class="flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all bg-white dark:bg-zinc-800 shadow-sm text-satinGold">Clientes</button>
        <button onclick="switchTab('tab-perfil')" id="btn-tab-perfil" class="flex-1 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-all opacity-50">Meu Perfil</button>
    </div>

    <section id="tab-clientes" class="space-y-6">
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-satinGold opacity-50"></i>
                <input type="text" id="adminSearch" onkeyup="filterClients()" placeholder="Buscar cliente..." class="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-zinc-900 border border-satinGold/20 outline-none focus:border-satinGold shadow-sm">
            </div>
            <button onclick="openClientModal()" class="w-full sm:w-auto gold-gradient text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform text-sm uppercase tracking-widest">
                <i class="fas fa-user-plus mr-2"></i>Novo Cliente
            </button>
        </div>

        <div id="admin-client-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full py-20 text-center opacity-50 italic">Carregando base de dados...</div>
        </div>
    </section>

    <section id="tab-perfil" class="hidden">
        <div class="bg-white dark:bg-zinc-900 p-8 rounded-[30px] shadow-xl border border-satinGold/10 space-y-6">
            <h3 class="font-serif text-2xl text-darkGold border-b border-satinGold/20 pb-4">Informações do Consultório</h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-satinGold uppercase">Nome Profissional</label>
                    <input type="text" id="config-name" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-satinGold uppercase">Registro OAB</label>
                    <input type="text" id="config-oab" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-satinGold uppercase">URL da Foto (Perfil)</label>
                    <input type="text" id="config-img" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-satinGold uppercase">WhatsApp Comercial</label>
                    <input type="text" id="config-phone" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-satinGold uppercase">E-mail Profissional</label>
                <input type="text" id="config-email" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-satinGold uppercase">Breve Biografia / Especialidade</label>
                <textarea id="config-desc" class="w-full p-3 rounded-xl border dark:bg-zinc-800 outline-none focus:border-satinGold h-24"></textarea>
            </div>

            <div class="pt-6 border-t border-satinGold/20">
                <h4 class="font-serif text-lg text-darkGold mb-4 uppercase tracking-tighter">Palavra Secreta de Segurança</h4>
                <input type="password" id="config-secret" placeholder="Confirme sua palavra secreta para salvar" class="w-full p-4 rounded-xl border-2 border-satinGold bg-pearl dark:bg-zinc-800 text-center font-bold">
                <button onclick="saveProfile()" class="w-full mt-4 gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl uppercase tracking-widest">Salvar Alterações</button>
            </div>
        </div>
    </section>

</main>

<div id="modal-client" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/60 overflow-y-auto">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-xl p-8 my-auto rounded-[40px] border border-satinGold/30 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modal-title" class="font-serif text-2xl text-darkGold">Novo Processo</h3>
            <button onclick="closeModal('modal-client')" class="text-satinGold opacity-50 hover:opacity-100"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <div class="space-y-1">
                <label class="text-[10px] font-bold opacity-50 uppercase">Nome do Reclamante</label>
                <input type="text" id="c-nome" class="w-full p-3 rounded-xl border dark:bg-zinc-800">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold opacity-50 uppercase">E-mail para Login</label>
                <input type="email" id="c-email" class="w-full p-3 rounded-xl border dark:bg-zinc-800">
            </div>
        </div>

        <div class="bg-gray-50 dark:bg-zinc-800/50 p-6 rounded-3xl border border-satinGold/20 space-y-4">
            <div class="flex items-center justify-between">
                <label class="text-xs font-bold text-satinGold uppercase tracking-widest">Status do Processo</label>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="a-new-card" class="accent-satinGold" checked>
                    <label for="a-new-card" class="text-[9px] font-bold opacity-70">CRIAR NOVO CARD NO HISTÓRICO</label>
                </div>
            </div>
            
            <select id="a-status" class="w-full p-4 rounded-xl border-2 border-satinGold/30 dark:bg-zinc-900 font-bold text-sm">
                <option value="Petição Inicial Protocolada">Petição Inicial Protocolada</option>
                <option value="Aguardando Citação">Aguardando Citação</option>
                <option value="Audiência de Conciliação Designada">Audiência de Conciliação Designada</option>
                <option value="Audiência de Instrução e Julgamento">Audiência de Instrução e Julgamento</option>
                <option value="Processo em Prazo para Alegações">Processo em Prazo para Alegações</option>
                <option value="Concluso para Sentença">Concluso para Sentença</option>
                <option value="Sentença Proferida">Sentença Proferida</option>
                <option value="Recurso em Andamento">Recurso em Andamento</option>
                <option value="Fase de Execução / Cálculos">Fase de Execução / Cálculos</option>
                <option value="Processo Finalizado / Arquivado">Processo Finalizado / Arquivado</option>
            </select>

            <textarea id="a-desc" placeholder="Descreva os detalhes da última movimentação de forma simples para o cliente entender..." class="w-full p-4 rounded-xl border dark:bg-zinc-900 h-32 text-sm"></textarea>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="closeModal('modal-client')" class="flex-1 py-4 font-bold opacity-50 text-xs uppercase tracking-widest">Cancelar</button>
            <button onclick="saveClientData()" class="flex-1 gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl text-xs uppercase tracking-widest">Salvar Registro</button>
        </div>
    </div>
</div>

<script>
    const URL_SCRIPT = "SEU_WEB_APP_URL_DO_GOOGLE"; // Mesma URL usada no site principal
    const API_KEY_SECRET = "ADV_SISTEMA_SEGURO_2026_X9"; // Deve ser igual ao script da planilha
    
    let dbClients = [];
    let currentEditEmail = null;

    window.onload = () => {
        checkAuth(); // Verifica se o login de 24h ainda vale
        fetchData();
    };

    function checkAuth() {
        // Implementação da segurança: se não houver token no storage, manda pro login
        const token = localStorage.getItem('ADV_ADMIN_TOKEN');
        if (!token) {
            // Se você quiser uma página de login separada, redirecione aqui. 
            // Por enquanto, o acesso é controlado pelo seu Modal de Senha Secreta.
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(URL_SCRIPT, {
                method: 'POST',
                body: JSON.stringify({ action: 'bio', api_key: API_KEY_SECRET })
            });
            const bio = await response.json();
            fillProfileFields(bio);

            // Aqui você faria o fetch da lista completa de clientes (Action: list_clients)
            // Vou simular a estrutura baseada na planilha
            renderClients(); 
        } catch (e) {
            console.error("Erro ao sincronizar:", e);
        }
    }

    function fillProfileFields(data) {
        document.getElementById('config-name').value = data.name || "";
        document.getElementById('config-oab').value = data.oab || "";
        document.getElementById('config-desc').value = data.desc || "";
        document.getElementById('config-phone').value = data.phone || "";
        document.getElementById('config-email').value = data.email || "";
        document.getElementById('config-img').value = data.img || "";
    }

    function renderClients() {
        const list = document.getElementById('admin-client-list');
        list.innerHTML = '';
        
        // Simulação de renderização (No real, viria do fetch)
        dbClients.forEach(c => {
            list.innerHTML += `
                <div class="bg-white dark:bg-zinc-900 p-6 rounded-[25px] border border-satinGold/10 client-card shadow-sm flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-darkGold">${c.name}</h4>
                        <p class="text-[10px] opacity-50 uppercase font-bold">${c.email}</p>
                    </div>
                    <button onclick="editClient('${c.email}')" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-zinc-800 text-satinGold hover:bg-satinGold hover:text-white transition-all">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
            `;
        });
    }

    function openClientModal() {
        currentEditEmail = null;
        document.getElementById('modal-title').innerText = "Novo Processo";
        document.getElementById('c-nome').value = "";
        document.getElementById('c-email').value = "";
        document.getElementById('a-desc').value = "";
        document.getElementById('modal-client').classList.remove('hidden');
        document.getElementById('modal-client').classList.add('flex');
    }

    function switchTab(tabId) {
        document.getElementById('tab-clientes').classList.add('hidden');
        document.getElementById('tab-perfil').classList.add('hidden');
        document.getElementById('btn-tab-clientes').classList.add('opacity-50');
        document.getElementById('btn-tab-perfil').classList.add('opacity-50');

        document.getElementById(tabId).classList.remove('hidden');
        document.getElementById('btn-' + tabId).classList.remove('opacity-50');
        document.getElementById('btn-' + tabId).classList.add('bg-white', 'dark:bg-zinc-800', 'shadow-sm', 'text-satinGold');
    }

    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
        document.getElementById(id).classList.remove('flex');
    }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
        const icon = document.getElementById('themeIcon');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    function logoutAdmin() {
        if(confirm("Deseja encerrar a sessão de gestão?")) {
            localStorage.removeItem('ADV_ADMIN_TOKEN');
            window.location.reload();
        }
    }

    // INTEGRAÇÃO COM O BACKEND (GOOGLE APPS SCRIPT)
    async function saveClientData() {
        const payload = {
            action: 'save_client', // Você precisará criar essa função no seu .gs
            api_key: API_KEY_SECRET,
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            status: document.getElementById('a-status').value,
            descricao: document.getElementById('a-desc').value,
            novo_card: document.getElementById('a-new-card').checked
        };

        // Lógica de envio fetch para o seu Script...
        alert("Dados enviados para a planilha!");
        closeModal('modal-client');
    }
</script>

</body>
</html>
