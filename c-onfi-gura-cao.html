<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Gestão Jurídica</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    </script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        input, select, textarea { -webkit-user-select: text !important; -moz-user-select: text !important; -ms-user-select: text !important; user-select: text !important; }
        img { pointer-events: none !important; -webkit-user-drag: none !important; }
        .modal-blur { backdrop-filter: blur(8px); }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
        .tab-indicator { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-tab { color: #C5A059 !important; opacity: 1 !important; }
        .inactive-tab { color: #9ca3af !important; opacity: 0.6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
    </style>
</head>
<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 gold-gradient rounded-full flex items-center justify-center text-white shadow-lg"><i class="fas fa-gavel"></i></div>
        <h1 class="font-serif font-bold text-darkGold tracking-tighter hidden sm:block text-xl">PAINEL DE GESTÃO</h1>
    </div>
    <div class="flex gap-4 items-center">
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all"><i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i></button>
        <button onclick="logoutAdmin()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-xs font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">Sair</button>
    </div>
</header>

<main class="pt-28 pb-20 px-4 max-w-4xl mx-auto text-center">
    <div class="relative flex mb-8 bg-gray-100 dark:bg-zinc-900 p-1 rounded-2xl h-14">
        <div id="tab-pill" class="tab-indicator absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-zinc-800 rounded-xl shadow-sm z-0"></div>
        <button onclick="switchTab('tab-clientes')" id="btn-tab-clientes" class="relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all active-tab">Clientes</button>
        <button onclick="switchTab('tab-perfil')" id="btn-tab-perfil" class="relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all inactive-tab">Meu Perfil</button>
    </div>

    <section id="tab-clientes" class="space-y-6">
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-satinGold opacity-50"></i>
                <input type="text" id="adminSearch" onkeyup="filterClients()" placeholder="Buscar nome..." class="w-full pl-12 pr-4 py-3 rounded-2xl bg-white dark:bg-zinc-900 border border-satinGold/20 outline-none focus:border-satinGold shadow-sm">
            </div>
            <button onclick="openModalNovoCliente()" class="w-full sm:w-auto gold-gradient text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-transform text-sm uppercase tracking-widest"><i class="fas fa-user-plus mr-2"></i>Novo Cliente</button>
        </div>
        <div id="admin-client-list" class="grid grid-cols-1 gap-4"></div>
    </section>

    <section id="tab-perfil" class="hidden">
        <div class="bg-white dark:bg-zinc-900 p-8 rounded-[30px] shadow-xl border border-satinGold/10 space-y-6">
            <h3 class="font-serif text-3xl text-darkGold border-b border-satinGold/20 pb-4 text-center">Informações do Consultório</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-left">
                <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">Nome Profissional</label><input type="text" id="config-name" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
                <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">Registro OAB</label><input type="text" id="config-oab" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
                <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">URL da Foto</label><input type="text" id="config-img" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
                <div class="space-y-2"><label class="text-[10px] font-bold text-satinGold uppercase">WhatsApp</label><input type="text" id="config-phone" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
            </div>
            <div class="space-y-2 text-left"><label class="text-[10px] font-bold text-satinGold uppercase">E-mail Profissional</label><input type="text" id="config-email" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
            <div class="space-y-2 text-left"><label class="text-[10px] font-bold text-satinGold uppercase">Breve Biografia</label><textarea id="config-desc" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800 h-24"></textarea></div>
            <div class="pt-6 border-t border-satinGold/20 space-y-6">
                <div class="space-y-4 text-left">
                    <div><label class="text-[10px] font-bold text-satinGold uppercase">Nova Senha</label><input type="password" id="config-pass" class="w-full p-4 rounded-xl border-2 border-satinGold/30 bg-white dark:bg-zinc-800 outline-none"></div>
                    <div><label class="text-[10px] font-bold text-satinGold uppercase">Palavra Secreta</label>
                        <div class="relative"><input type="password" id="config-secret" class="w-full p-4 rounded-xl border-2 border-satinGold/30 bg-pearl dark:bg-zinc-800 font-bold" readonly value="********"><div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2"><input type="checkbox" id="check-change-secret" onchange="toggleNewSecretField()" class="w-5 h-5 accent-satinGold"></div></div>
                    </div>
                    <div id="container-new-secret" class="hidden"><label class="text-[10px] font-bold text-darkGold uppercase">Nova Palavra</label><input type="text" id="config-new-secret" class="w-full p-4 rounded-xl border-2 border-darkGold bg-white dark:bg-zinc-900 outline-none"></div>
                </div>
                <button onclick="triggerConfirm('perfil')" class="w-full gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl uppercase tracking-widest hover:scale-[1.01] transition-transform">Salvar Alterações</button>
            </div>
        </div>
    </section>
</main>

<div id="modal-client" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/60 overflow-y-auto">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-xl p-8 my-auto rounded-[40px] border border-satinGold/30 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modal-title" class="font-serif text-3xl text-darkGold uppercase tracking-widest">Novo Registro</h3>
            <button onclick="closeModal('modal-client')" class="text-satinGold opacity-50 hover:opacity-100"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 text-left">
            <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">Nome do Reclamante</label><input type="text" id="c-nome" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
            <div class="space-y-1"><label class="text-[10px] font-bold text-satinGold uppercase">E-mail para Login</label><input type="email" id="c-email" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>
        </div>
        <div class="space-y-1 text-left mb-6"><label class="text-[10px] font-bold text-satinGold uppercase">N. Processo (Opcional)</label><input type="text" id="c-num-proc" class="w-full p-3 rounded-xl border border-satinGold/20 dark:bg-zinc-800"></div>

        <div class="bg-gray-50 dark:bg-zinc-800/50 p-6 rounded-3xl border border-satinGold/20 space-y-4">
            <div class="flex items-center justify-between">
                <label class="text-sm font-bold text-satinGold uppercase tracking-widest">Status do Processo</label>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="c-notificar" class="accent-satinGold" checked>
                    <label for="c-notificar" class="text-[10px] font-bold opacity-70 uppercase">Notificar e-mail</label>
                </div>
            </div>
            <div id="container-edit-mode" class="hidden text-left">
                 <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="add-new-card-check" class="w-4 h-4 accent-satinGold" onchange="toggleEditUI()">
                    <label class="text-[10px] font-bold uppercase text-satinGold">Adicionar Novo Card (Histórico)</label>
                 </div>
            </div>
            <div id="ui-card-fields">
                <select id="a-status" class="w-full p-4 mb-4 rounded-xl border-2 border-satinGold/30 dark:bg-zinc-900 font-bold text-sm">
                    <option value="Petição Inicial Protocolada">Petição Inicial Protocolada</option>
                    <option value="Aguardando Citação">Aguardando Citação</option>
                    <option value="Audiência de Conciliação Designada">Audiência de Conciliação Designada</option>
                    <option value="Audiência de Instrução e Julgamento">Audiência de Instrução e Julgamento</option>
                    <option value="Sentença Proferida">Sentença Proferida</option>
                    <option value="Fase de Execução / Cálculos">Fase de Execução / Cálculos</option>
                    <option value="Processo Finalizado / Arquivado">Processo Finalizado / Arquivado</option>
                </select>
                <textarea id="a-desc" placeholder="Descreva os detalhes..." class="w-full p-4 rounded-xl border border-satinGold/20 dark:bg-zinc-900 h-32 text-sm"></textarea>
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="closeModal('modal-client')" class="flex-1 py-4 font-bold opacity-50 text-[10px] uppercase">Cancelar</button>
            <button onclick="triggerConfirm('cliente')" class="flex-1 gold-gradient text-white py-4 rounded-2xl font-bold shadow-xl text-[10px] uppercase">Salvar Registro</button>
        </div>
    </div>
</div>

<div id="modal-confirm" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 modal-blur bg-black/80">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-[30px] border-2 border-satinGold text-center shadow-2xl">
        <div class="w-16 h-16 gold-gradient rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4"><i class="fas fa-question"></i></div>
        <h3 class="font-serif text-xl text-darkGold mb-2 uppercase">Confirmar?</h3>
        <p class="text-sm opacity-70 mb-8 font-sans">Deseja aplicar estas alterações?</p>
        <div class="flex gap-3">
            <button onclick="closeModal('modal-confirm')" class="flex-1 py-3 text-xs font-bold uppercase opacity-50">Não</button>
            <button id="btn-confirm-yes" class="flex-1 gold-gradient text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">Sim</button>
        </div>
    </div>
</div>

<div id="modal-success" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 modal-blur bg-black/60">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-10 rounded-[30px] border-2 border-satinGold text-center shadow-2xl">
        <div class="w-20 h-20 gold-gradient rounded-full flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-lg"><i class="fas fa-check"></i></div>
        <h3 class="font-serif text-2xl text-darkGold mb-2 uppercase font-bold">Sucesso!</h3>
        <p class="text-sm opacity-80 mb-10 font-sans">Dados salvos com sucesso.</p>
        <button onclick="closeModal('modal-success')" class="w-full gold-gradient text-white py-4 rounded-xl text-xs font-bold uppercase shadow-md">Fechar</button>
    </div>
</div>

<script>
const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1";
const MASTER_KEY = "Adv_Seguro_2026_##";
let dbClients = [];
let currentClientEmail = "";

window.onload = () => {
    if (!sessionStorage.getItem('ADV_AUTH_SESS')) { window.location.href = "index.html"; return; }
    carregarPerfil(); carregarClientes();
};

function carregarPerfil() {
    fetch(URL_SCRIPT, { method: "POST", credentials: "include", body: JSON.stringify({ action: "bio", api_key: MASTER_KEY }) })
    .then(res => res.json()).then(data => {
        document.getElementById('config-name').value = data.name || "";
        document.getElementById('config-oab').value = data.oab || "";
        document.getElementById('config-img').value = data.img || "";
        document.getElementById('config-phone').value = data.phone || "";
        document.getElementById('config-email').value = data.email || "";
        document.getElementById('config-desc').value = data.desc || "";
    });
}

function carregarClientes() {
    fetch(URL_SCRIPT, { method: "POST", credentials: "include", body: JSON.stringify({ action: "listar_clientes", api_key: MASTER_KEY }) })
    .then(res => res.json()).then(data => { dbClients = data; renderClients(); });
}

function openModalNovoCliente() {
    document.getElementById('modal-title').innerText = "Novo Registro";
    document.getElementById('c-nome').value = ""; document.getElementById('c-email').value = "";
    document.getElementById('c-email').disabled = false; document.getElementById('c-num-proc').value = "";
    document.getElementById('a-status').value = "Petição Inicial Protocolada"; document.getElementById('a-desc').value = "";
    document.getElementById('container-edit-mode').classList.add('hidden');
    openModal('modal-client');
}

function openEditClient(id) {
    const c = dbClients.find(x => x.id == id);
    if(!c) return;
    currentClientEmail = c.email;
    document.getElementById('modal-title').innerText = "Editar Registro";
    document.getElementById('c-nome').value = c.nome;
    document.getElementById('c-email').value = c.email;
    document.getElementById('c-email').disabled = true;
    document.getElementById('c-notificar').checked = c.notificar;
    document.getElementById('c-num-proc').value = c.numero_processo || "";
    
    const ultimoCard = c.timeline[c.timeline.length - 1] || { status: '', descricao: '' };
    document.getElementById('a-status').value = ultimoCard.status;
    document.getElementById('a-desc').value = ultimoCard.descricao;
    
    document.getElementById('container-edit-mode').classList.remove('hidden');
    document.getElementById('add-new-card-check').checked = false;
    openModal('modal-client');
}

function toggleEditUI() {
    const isNew = document.getElementById('add-new-card-check').checked;
    if (isNew) {
        document.getElementById('a-status').value = "Petição Inicial Protocolada";
        document.getElementById('a-desc').value = "";
    } else {
        const c = dbClients.find(x => x.email === currentClientEmail);
        const ultimo = c.timeline[c.timeline.length -1];
        document.getElementById('a-status').value = ultimo.status;
        document.getElementById('a-desc').value = ultimo.descricao;
    }
}

async function saveClientData() {
    const isEdit = document.getElementById('modal-title').innerText.includes("Editar");
    let data = { action: isEdit ? "update_client_timeline" : "save_client", api_key: MASTER_KEY };
    
    if(isEdit) {
        const c = dbClients.find(x => x.email === currentClientEmail);
        let timeline = [...c.timeline];
        const novoStatus = document.getElementById('a-status').value;
        const novaDesc = document.getElementById('a-desc').value;
        
        if (document.getElementById('add-new-card-check').checked) {
            timeline.push({ data: new Date().toLocaleDateString('pt-BR'), status: novoStatus, descricao: novaDesc });
        } else {
            timeline[timeline.length - 1] = { ...timeline[timeline.length - 1], status: novoStatus, descricao: novaDesc };
        }
        data.nome = document.getElementById('c-nome').value;
        data.email = currentClientEmail;
        data.notificar = document.getElementById('c-notificar').checked;
        data.timeline_json = JSON.stringify(timeline);
    } else {
        data.nome = document.getElementById('c-nome').value; data.email = document.getElementById('c-email').value;
        data.notificar = document.getElementById('c-notificar').checked; data.status = document.getElementById('a-status').value;
        data.descricao = document.getElementById('a-desc').value; data.numero_processo = document.getElementById('c-num-proc').value;
    }

    try {
        const res = await fetch(URL_SCRIPT, { method: "POST", credentials: "include", body: JSON.stringify(data) });
        const result = await res.json();
        if(result.status === "ok") { closeModal('modal-client'); openModal('modal-success'); carregarClientes(); }
    } catch(e) {}
}

async function deleteClient(email) {
    if(!confirm("Excluir permanentemente este cliente?")) return;
    try {
        await fetch(URL_SCRIPT, { method: "POST", credentials: "include", body: JSON.stringify({ action: "delete_client", email: email, api_key: MASTER_KEY }) });
        carregarClientes();
    } catch(e) {}
}

async function saveProfileData() {
    const data = { action: "save_profile", api_key: MASTER_KEY, name: document.getElementById('config-name').value, oab: document.getElementById('config-oab').value, img: document.getElementById('config-img').value, phone: document.getElementById('config-phone').value, email: document.getElementById('config-email').value, desc: document.getElementById('config-desc').value, new_pass: document.getElementById('config-pass').value, new_secret: document.getElementById('check-change-secret').checked ? document.getElementById('config-new-secret').value : null };
    try { await fetch(URL_SCRIPT, { method: "POST", credentials: "include", body: JSON.stringify(data) }); openModal('modal-success'); } catch(e) {}
}

function renderClients() {
    const list = document.getElementById('admin-client-list');
    list.innerHTML = '';
    const searchNome = document.getElementById('adminSearch').value.toLowerCase();
    
    dbClients.filter(c => c.nome.toLowerCase().includes(searchNome)).forEach((c) => {
        const isHist = searchNome.length > 0;
        const timelineRev = [...c.timeline].reverse();
        const cardsToShow = isHist ? timelineRev : [timelineRev[0]];

        cardsToShow.forEach((card, index) => {
            list.innerHTML += `
                <div class="bg-white dark:bg-zinc-900 p-6 rounded-[25px] border border-satinGold/10 flex justify-between items-center shadow-sm mb-2">
                    <div class="text-left">
                        <h4 class="font-bold text-darkGold text-lg">${c.nome} ${c.numero_processo ? `<span class="text-[10px] opacity-40">#${c.numero_processo}</span>` : ''}</h4>
                        <p class="text-[10px] uppercase font-bold opacity-50">${card.status} <span class="ml-2 text-[8px] opacity-30">${card.data}</span></p>
                    </div>
                    <div class="flex gap-2">
                        ${!isHist || index === 0 ? `<button onclick="openEditClient(${c.id})" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-zinc-800 text-satinGold"><i class="fas fa-pen text-xs"></i></button>` : ''}
                        ${!isHist ? `<button onclick="deleteClient('${c.email}')" class="w-8 h-8 rounded-full bg-red-50 text-red-400"><i class="fas fa-trash text-xs"></i></button>` : ''}
                    </div>
                </div>`;
        });
    });
}

function filterClients() { renderClients(); }
function switchTab(tabId) {
    const pill = document.getElementById('tab-pill'); const isClientes = tabId === 'tab-clientes';
    pill.style.transform = isClientes ? 'translateX(0)' : 'translateX(100%)';
    document.getElementById('tab-clientes').classList.toggle('hidden', !isClientes);
    document.getElementById('tab-perfil').classList.toggle('hidden', isClientes);
    document.getElementById('btn-tab-clientes').className = `relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${isClientes ? 'active-tab' : 'inactive-tab'}`;
    document.getElementById('btn-tab-perfil').className = `relative z-10 flex-1 py-4 rounded-xl font-bold text-sm uppercase tracking-widest transition-all ${!isClientes ? 'active-tab' : 'inactive-tab'}`;
}
function openModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); }
function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }
function triggerConfirm(tipo) { openModal('modal-confirm'); document.getElementById('btn-confirm-yes').onclick = () => { closeModal('modal-confirm'); if(tipo === 'perfil') saveProfileData(); if(tipo === 'cliente') saveClientData(); }; }
function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
function toggleNewSecretField() { const check = document.getElementById('check-change-secret'); document.getElementById('container-new-secret').classList.toggle('hidden', !check.checked); }
function logoutAdmin() { sessionStorage.removeItem('ADV_AUTH_SESS'); window.location.href = "index.html"; }
</script>
</body>
</html>
