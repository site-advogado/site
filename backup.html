<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Linha do Tempo | Gestão Jurídica</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <style>  
        body { user-select: none; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #process-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        #process-carousel::-webkit-scrollbar { display: none; }
        .process-card { flex: 0 0 85%; scroll-snap-align: center; border: 2px solid transparent; transition: 0.3s; }
        .process-card.active { border-color: #C5A059; transform: scale(1.02); }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">  

<div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Sincronizando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <span class="font-serif font-bold text-darkGold uppercase text-xs">Área do Cliente</span>
    <button onclick="sair()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-[10px] font-bold">SAIR</button>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <section class="text-center mb-6">
        <h2 class="font-serif text-2xl font-bold text-darkGold uppercase">Meus Processos</h2>
        <p class="text-[10px] opacity-50 uppercase tracking-widest mt-1">Deslize para alternar entre as ações</p>
    </section>

    <div id="process-carousel" class="mb-8"></div>

    <div id="client-dashboard" class="grid grid-cols-2 gap-3 mb-10">
        <div class="col-span-2 bg-white dark:bg-zinc-800 p-6 rounded-[2rem] border border-satinGold/20 text-center">
            <p class="text-[10px] font-bold text-satinGold uppercase mb-1">Status Atual</p>
            <h2 id="client-main-status" class="text-xl font-serif text-darkGold font-bold uppercase">...</h2>
        </div>
        <div class="bg-white dark:bg-zinc-800 p-4 rounded-[2rem] border border-satinGold/20 text-center">
            <p class="text-[9px] font-bold text-satinGold uppercase mb-1">Conclusão</p>
            <div class="w-full bg-gray-200 h-2 rounded-full mt-3 overflow-hidden">
                <div id="progress-bar" class="gold-gradient h-full" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-[10px] mt-2 font-bold opacity-60">0%</p>
        </div>
        <div class="bg-white dark:bg-zinc-800 p-4 rounded-[2rem] border border-satinGold/20 text-center">
            <p class="text-[9px] font-bold text-satinGold uppercase mb-1">Movimentações</p>
            <h2 id="total-updates" class="text-2xl font-serif text-darkGold">0</h2>
        </div>
    </div>

    <div class="border-l-4 border-satinGold/30 pl-6 space-y-8" id="timeline-content"></div>  
</main>  

<script>
const URL_SCRIPT = "SUA_URL_DO_SCRIPT_AQUI"; // COLE A URL DO SEU SCRIPT GOOGLE APPS
const MASTER_API_KEY = "Adv_Seguro_2026_##";

let allProcessData = {}; 

async function carregarTimeline() {
    const token = sessionStorage.getItem('ADV_AUTH_SESS');
    if (!token) window.location.href = "index.html";

    try {
        const response = await fetch(URL_SCRIPT, {
            method: 'POST',
            body: JSON.stringify({ api_key: MASTER_API_KEY, action: 'timeline', token: token })
        });
        const data = await response.json();
        
        if (data.length > 0) {
            allProcessData = data.reduce((acc, current) => {
                acc[current.numero_processo] = current;
                return acc;
            }, {});
            renderCarousel();
            switchProcess(data[0].numero_processo);
        }
    } catch (e) { console.error(e); }
    finally { document.getElementById('globalLoader').style.display = 'none'; }
}

function renderCarousel() {
    const carousel = document.getElementById('process-carousel');
    carousel.innerHTML = '';
    Object.keys(allProcessData).forEach(procId => {
        const p = allProcessData[procId];
        const lastStatus = p.atualizacoes.length > 0 ? p.atualizacoes[p.atualizacoes.length-1].status : "Pendente";
        carousel.innerHTML += `
            <div class="process-card bg-white dark:bg-zinc-900 p-5 rounded-[2rem] shadow-lg cursor-pointer" id="card-${procId}" onclick="switchProcess('${procId}')">
                <p class="text-[9px] font-bold text-satinGold uppercase">${p.tipo_acao}</p>
                <h3 class="font-serif font-bold text-darkGold text-sm truncate uppercase mt-1">${procId}</h3>
                <p class="text-[10px] mt-2 opacity-60">Status: ${lastStatus}</p>
                <p class="text-[10px] mt-1 opacity-40">Clique para ver detalhes deste processo.</p>
            </div>`;
    });
}

function switchProcess(procId) {
    document.querySelectorAll('.process-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${procId}`).classList.add('active');

    const proc = allProcessData[procId];
    const events = proc.atualizacoes;
    const lastEvent = events[events.length - 1] || { status: "Em análise", descricao: "Aguardando atualização" };

    document.getElementById('client-main-status').innerText = lastEvent.status;
    document.getElementById('total-updates').innerText = events.length;

    // Lógica de progresso baseada no status (exemplo simples)
    let prog = 10;
    if(lastEvent.status.toLowerCase().includes("sentença")) prog = 80;
    if(lastEvent.status.toLowerCase().includes("finalizado")) prog = 100;
    document.getElementById('progress-bar').style.width = prog + "%";
    document.getElementById('progress-text').innerText = prog + "% CONCLUÍDO";

    const container = document.getElementById('timeline-content');
    container.innerHTML = '';
    [...events].reverse().forEach(ev => {
        container.innerHTML += `
            <div class="bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold">
                <p class="text-[10px] font-bold text-satinGold uppercase">${ev.data}</p>
                <h4 class="font-serif font-bold text-darkGold">${ev.status}</h4>
                <p class="text-sm opacity-80 mt-2">${ev.descricao}</p>
            </div>`;
    });
}

window.onload = carregarTimeline;
function sair() { sessionStorage.clear(); window.location.href = "index.html"; }
</script>
</body>  
</html>
