<!DOCTYPE html>  
<html lang="pt-br" class="light"> 
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Acesso Jurídico</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <script>  
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }  
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') document.documentElement.classList.add('dark');
    </script>  
    <style>
        body { -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: text !important; user-select: text !important; }
        .modal-blur { backdrop-filter: blur(8px); }  
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>  
<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">  
<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm"><div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl flex flex-col items-center"><div class="loader mb-4"></div><p class="text-satinGold font-bold text-sm uppercase">Verificando...</p></div></div>

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6"><img id="bio-img" src="" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl"></div>  
        <h1 id="bio-name" class="font-serif text-3xl font-bold text-darkGold mb-1 uppercase">Carregando...</h1>  
        <p id="bio-oab" class="text-sm font-semibold opacity-70 mb-3"></p>  
        <p id="bio-desc" class="text-sm italic px-4 mb-5"></p>  
    </section>  
    <section class="bg-white dark:bg-zinc-900 p-10 rounded-[30px] shadow-xl border border-satinGold/10">  
        <h3 class="font-serif text-2xl mb-8 text-center tracking-wide">Consultar Processo</h3>  
        <div class="space-y-6">  
            <div><label class="text-xs uppercase font-bold text-satinGold">E-mail</label><input type="email" id="searchCpf" class="w-full bg-transparent border-b-2 border-gray-300 py-3 outline-none focus:border-satinGold transition-all"></div>  
            <button onclick="handleClientSearch()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg">ACESSAR</button>  
        </div>  
    </section>  
</main>

<div id="admin-wrapper"></div>
<div id="modalCode" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-8 border border-satinGold/30 text-center">
        <h3 class="font-serif text-xl mb-2 text-darkGold uppercase">Verificação</h3>
        <input type="text" id="inputOtp" maxlength="6" class="w-full bg-transparent border-b-2 border-satinGold text-center text-2xl tracking-widest font-bold outline-none py-2 mb-8 dark:text-pearl">
        <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl uppercase">Validar</button>
        <button onclick="closeModal()" class="w-full py-2 text-xs opacity-50 uppercase mt-2">Cancelar</button>
    </div>
</div>

<script>
const URL_SCRIPT = `https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1`;
function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

window.onload = () => { fetchBio(); };

function fetchBio() {
    showLoading();
    fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "bio" }) })
    .then(res => res.json()).then(data => {
        document.getElementById('bio-name').textContent = data.name;
        document.getElementById('bio-oab').textContent = data.oab;
        document.getElementById('bio-desc').textContent = data.desc;
        document.getElementById('bio-img').src = data.img;
    }).finally(() => hideLoading());
}

async function handleClientSearch() {
    const user = document.getElementById('searchCpf').value.trim();
    showLoading();
    try {
        const res = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "login", usuario: user, passo: "solicitar" }) });
        const data = await res.json();
        if (data.status === "abrir_modal_admin") {
            document.getElementById('admin-wrapper').innerHTML = data.html;
            document.getElementById('modalAdmin').classList.replace('hidden', 'flex');
        } else if (data.status === "codigo_enviado") {
            document.getElementById('modalCode').classList.replace('hidden', 'flex');
        }
    } catch (e) { alert("Erro de conexão."); } finally { hideLoading(); }
}

async function realizarLoginAdmin() {
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;
    showLoading();
    const res = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "login", usuario: user, senha: pass }) });
    const data = await res.json();
    if(data.status === "sucesso") window.location.href = "configuracao.html";
    else alert("Dados inválidos");
    hideLoading();
}

async function confirmCode() {
    const code = document.getElementById('inputOtp').value;
    const email = document.getElementById('searchCpf').value;
    showLoading();
    const res = await fetch(URL_SCRIPT, { method: "POST", body: JSON.stringify({ action: "login", usuario: email, codigo: code, passo: "verificar" }) });
    const data = await res.json();
    if (data.status === "ok") {
        localStorage.setItem('ADV_USER_EMAIL', email);
        window.location.href = "linha-tempo.html";
    } else alert("Código incorreto");
    hideLoading();
}
function closeModal() { document.getElementById('modalCode').classList.replace('flex', 'hidden'); }
function closeAdminModal() { document.getElementById('modalAdmin').classList.replace('flex', 'hidden'); }
</script>
</body></html>
