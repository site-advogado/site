<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Advocacia">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3503/3503567.png">

    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dra. Nome da Advogada | Gestão Processual</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    
    <script>  
    tailwind.config = {  
        darkMode: 'class',  
        theme: {  
            extend: {  
                colors: {  
                    pearl: '#FDFCF8',  
                    softBlack: '#1A1A1A',  
                    satinGold: '#C5A059',  
                    darkGold: '#A37E3B'  
                },  
                fontFamily: {  
                    serif: ['Cinzel', 'serif'],  
                    sans: ['Montserrat', 'sans-serif'],  
                }  
            }  
        }  
    }  
    </script>  

    <style>  
body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
input, select, textarea { -webkit-user-select: text !important; -moz-user-select: text !important; -ms-user-select: text !important; user-select: text !important; }
img { pointer-events: none !important; -webkit-user-drag: none !important; }
        .modal-blur { backdrop-filter: blur(8px); }  
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Verificando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <button id="installApp" class="hidden bg-satinGold hover:bg-darkGold text-white px-4 py-2 rounded-full text-[10px] font-bold transition-all shadow-lg animate-bounce">  
        <i class="fas fa-download mr-2"></i>BAIXAR APP  
    </button>  
    <div class="flex gap-4 items-center ml-auto">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">  
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>  
        </button>  
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6">  
            <img id="bio-img" src="" alt="" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl">  
        </div>  
        <h1 id="bio-name" class="font-serif text-3xl font-bold tracking-widest text-darkGold mb-1 uppercase">Carregando...</h1>  
        <p id="bio-oab" class="text-sm font-semibold opacity-70 mb-3">OAB/MS 000.000</p>  
        <p id="bio-desc" class="text-sm italic px-4 mb-5 max-w-sm mx-auto">Sincronizando dados...</p>  
        <div class="flex justify-center gap-6 text-satinGold text-3xl">  
            <a id="bio-phone" href="#" target="_blank"><i class="fab fa-whatsapp hover:scale-110 transition-transform"></i></a>  
            <a id="bio-email" href="#"><i class="fas fa-envelope hover:scale-110 transition-transform"></i></a>  
        </div>
    </section>  

    <section id="view-client-search" class="bg-white dark:bg-zinc-900 p-10 rounded-[30px] shadow-xl border border-satinGold/10">  
        <h3 class="font-serif text-2xl mb-8 text-center text-softBlack dark:text-pearl tracking-wide">Consultar meu Processo</h3>  
        <div class="space-y-6">  
            <div>  
                <label class="text-xs uppercase font-bold text-satinGold tracking-wider">Reclamante</label>  
                <input type="email" id="searchCpf" autocomplete="username" placeholder="E-mail" class="w-full bg-transparent border-b-2 border-gray-300 dark:border-zinc-700 py-3 outline-none focus:border-satinGold transition-all text-base">  
            </div>  
            <button onclick="handleClientSearch()" id="btnSearch" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.03] transition-transform tracking-wider text-sm">  
                ACESSAR LINHA DO TEMPO  
            </button>  
        </div>  
    </section>  
</main>  

<div id="modalAdmin" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 modal-blur bg-black/60">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-10 border border-satinGold shadow-2xl text-center">
        <h3 class="font-serif text-2xl mb-6 text-darkGold uppercase tracking-widest font-bold">Acesso Restrito</h3>
        <div class="space-y-6 text-left">
            <div><label class="text-[10px] uppercase font-bold text-satinGold tracking-widest">Usuário Master</label><input type="text" id="adminUser" class="w-full bg-transparent border-b border-satinGold/50 py-2 outline-none focus:border-satinGold dark:text-white"></div>
            <div><label class="text-[10px] uppercase font-bold text-satinGold tracking-widest">Senha de Acesso</label><input type="password" id="adminPass" class="w-full bg-transparent border-b border-satinGold/50 py-2 outline-none focus:border-satinGold dark:text-white"></div>
            <button onclick="realizarLoginAdmin()" id="btnAdminLogin" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg text-xs tracking-widest uppercase mt-4">Entrar no Sistema</button>
            <button onclick="closeAdminModal()" class="w-full text-[10px] opacity-50 uppercase font-bold tracking-widest">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalCode" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-8 border border-satinGold/30 shadow-2xl text-center">
        <h3 class="font-serif text-xl mb-2 text-darkGold uppercase tracking-wider">Verificação</h3>
        <p class="text-base mb-2 opacity-70">Insira o código de 6 dígitos.</p>
        <div id="timerContainer" class="mb-6"><span class="text-xs font-bold text-satinGold bg-satinGold/10 px-3 py-1 rounded-full" id="timerLabel">Expira em: <span id="timer">03:00</span></span></div>
        <input type="text" id="inputOtp" maxlength="6" placeholder="000000" class="w-full bg-transparent border-b-2 border-satinGold text-center text-2xl tracking-[0.5em] font-bold outline-none py-2 mb-8 dark:text-pearl">
        <div class="flex flex-col gap-3">
            <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl shadow-md text-sm uppercase">Validar Acesso</button>
            <button onclick="closeModal()" class="w-full py-2 text-xs font-bold opacity-50 uppercase">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalError" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-10 border border-satinGold/40 shadow-2xl text-center">
        <h3 class="font-serif text-xl mb-3 text-darkGold uppercase tracking-widest">Aviso</h3>
        <p id="errorMessage" class="text-sm opacity-80 mb-10">E-mail não autorizado.</p>
        <button onclick="closeErrorModal()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg text-xs uppercase">Entendido</button>
    </div>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', function(e) { if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I")) e.preventDefault(); });

const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1"; 
function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

async function realizarLoginAdmin() {
    const user = document.getElementById('adminUser').value.replace(/\s+/g, '').toLowerCase();
    const pass = document.getElementById('adminPass').value;
    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: user, senha: pass, ip: await getClientIP() })
        });
        const data = await response.json();
        if(data.status === "sucesso") {
            sessionStorage.setItem('ADV_AUTH_SESS', 'true');
            setTimeout(() => { window.location.href = "c-onfi-gura-cao.html"; }, 500);
        } else alert(data.message);
    } catch (e) { alert("Erro de conexão."); } finally { hideLoading(); }
}

async function handleClientSearch() {  
    const inputUsuario = document.getElementById('searchCpf').value.trim();  
    if (!inputUsuario) return;
    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: inputUsuario, passo: "solicitar", ip: await getClientIP() })
        });
        const data = await response.json();
        if (data.status === "abrir_modal_admin") openAdminModal();
        else if (data.status === "codigo_enviado") openModal();
        else alert(data.message);
    } catch (e) { alert("Erro."); } finally { hideLoading(); }
}

async function confirmCode() {
    const code = document.getElementById('inputOtp').value.trim();
    const email = document.getElementById('searchCpf').value.trim();
    showLoading();
    try {
        const res = await fetch(URL_SCRIPT, {
            method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: email, codigo: code, passo: "verificar", ip: await getClientIP() })
        });
        const data = await res.json();
        if (data.status === "ok") {
            // ✅ Salva flag local antes de redirecionar para evitar expulsão
            sessionStorage.setItem('ADV_AUTH_SESS', 'true');
            setTimeout(() => { window.location.href = "cliente-adv.html"; }, 500);
        } else alert(data.message);
    } catch(e) { alert("Erro."); } finally { hideLoading(); }
}

async function getClientIP() { try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); return d.ip; } catch (e) { return "0.0.0.0"; } }
window.onload = () => { fetchBio(); sessionStorage.removeItem('ADV_AUTH_SESS'); };  
function fetchBio() { fetch(URL_SCRIPT, { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "bio" }) }).then(res => res.json()).then(data => { document.getElementById('bio-name').innerText = data.name; document.getElementById('bio-oab').innerText = data.oab; document.getElementById('bio-desc').innerText = data.desc; document.getElementById('bio-img').src = data.img; document.getElementById('bio-phone').href = `https://wa.me/55${data.phone}`; document.getElementById('bio-email').href = `mailto:${data.email}`; }); }
function openModal() { document.getElementById('modalCode').classList.replace('hidden', 'flex'); startTimer(180); }
function closeModal() { document.getElementById('modalCode').classList.replace('flex', 'hidden'); }
function openAdminModal() { document.getElementById('modalAdmin').classList.replace('hidden', 'flex'); }
function closeAdminModal() { document.getElementById('modalAdmin').classList.replace('flex', 'hidden'); }
function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
function startTimer(d) { let remaining = d; countdownInterval = setInterval(() => { remaining--; if(remaining<=0) clearInterval(countdownInterval); let m = Math.floor(remaining/60), s = remaining%60; document.getElementById('timer').textContent = `${m}:${s<10?'0':''}${s}`; },1000); }
</script>
</body>  
</html>
