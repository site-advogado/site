<!DOCTYPE html>
<html lang="pt-br" class="light"> 
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' *; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' * data:; connect-src 'self' https://api-advogada.siterefrigeracaoeliezer.workers.dev https://*.workers.dev;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Linha do Tempo | Gestão Jurídica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' },
          fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] }
        }
      }
    }
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.add('light');
    }
  </script>
  <style>
    body { -webkit-user-select: none; user-select: none; scroll-behavior: smooth; }
    input, textarea { -webkit-user-select: text !important; user-select: text !important; }
    img { pointer-events: none !important; -webkit-user-drag: none !important; }
    .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
    #process-carousel {
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      gap: 16px; padding: 10px 0; scrollbar-width: none;
      justify-content: flex-start; cursor: grab;
    }
    #process-carousel:active { cursor: grabbing; }
    #process-carousel::-webkit-scrollbar { display: none; }
    .process-card {
      flex: 0 0 85%; scroll-snap-align: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 2px solid transparent; pointer-events: auto !important;
    }
    .process-card.active {
      border-color: #C5A059; transform: scale(1.02);
      box-shadow: 0 20px 25px -5px rgba(197,160,89,0.15);
    }
    .timeline-item { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #C5A059; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
    .dot { width:8px; height:8px; border-radius:50%; background-color:#C5A059; opacity:0.3; transition:opacity 0.3s; }
    .dot.active { opacity:1; transform:scale(1.2); }

    /* Glossário modal */
    .glossary-modal { backdrop-filter: blur(12px); }
    .glossary-btn {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid #C5A059; color: #C5A059;
      font-size: 9px; font-weight: bold;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; margin-left: 4px;
      flex-shrink: 0; vertical-align: middle;
    }
    .glossary-btn:hover { background: #C5A059; color: white; }
  </style>
</head>
<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">

  <div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-pearl/60 dark:bg-softBlack/60 backdrop-blur-md">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center border border-satinGold/20">
      <div class="loader mb-4"></div>
      <p class="text-satinGold font-bold text-[10px] tracking-[0.3em] uppercase">Sincronizando dados</p>
    </div>
  </div>

  <!-- Modal Glossário Jurídico -->
  <div id="modal-glossario" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 glossary-modal bg-black/50">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm p-8 rounded-[30px] border border-satinGold/30 shadow-2xl text-center">
      <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center mx-auto mb-4 shadow">
        <i class="fas fa-book-open text-white text-sm"></i>
      </div>
      <h4 id="glossario-termo" class="font-serif text-xl text-darkGold uppercase tracking-widest mb-3">Termo</h4>
      <p id="glossario-def" class="text-sm leading-relaxed opacity-70 mb-8"></p>
      <button onclick="fecharGlossario()"
        class="w-full gold-gradient text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg">
        Entendido
      </button>
    </div>
  </div>

  <header class="fixed top-0 w-full z-50 p-4 bg-pearl/70 dark:bg-softBlack/70 backdrop-blur-lg border-b border-satinGold/10">
    <div class="max-w-lg mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 gold-gradient rounded-full flex items-center justify-center text-white shadow-lg">
          <i class="fas fa-shield-halved text-sm"></i>
        </div>
        <h1 class="font-serif font-bold text-darkGold tracking-widest text-xs uppercase">Área Segura</h1>
      </div>
      <div class="flex gap-3 items-center">
        <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-zinc-900 border border-satinGold/20 shadow-sm transition-all active:scale-90">
          <i id="themeIcon" class="fas fa-moon text-satinGold"></i>
        </button>
        <button onclick="logout()" class="bg-red-500/10 text-red-500 px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Sair</button>
      </div>
    </div>
  </header>

  <main class="pt-24 pb-20 px-4 max-w-lg mx-auto">
    <section class="mb-6 text-center">
      <p class="text-[10px] font-bold text-satinGold uppercase tracking-[0.3em] mb-1">Bem-vindo(a)</p>
      <h2 id="client-name-display" class="font-serif text-xl font-bold text-darkGold uppercase">...</h2>
    </section>
    <section class="mb-8 mt-4 text-center">
      <h2 class="font-serif text-3xl font-bold text-darkGold uppercase tracking-tighter">Linha do Tempo</h2>
      <div class="w-12 h-1 gold-gradient mx-auto mt-2 rounded-full opacity-50"></div>
    </section>

    <div id="process-carousel" class="mb-2"></div>
    <div id="carousel-dots" class="flex justify-center gap-2 mb-6"></div>

    <div class="grid grid-cols-2 gap-4 mb-10">
      <div class="col-span-2 bg-white dark:bg-zinc-900 p-6 rounded-[2rem] border border-satinGold/10 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <p class="text-[9px] font-bold text-satinGold uppercase tracking-[0.2em]">Status do Processo</p>
          <span class="flex h-2 w-2 rounded-full bg-satinGold animate-ping"></span>
        </div>
        <h3 id="current-status-text" class="font-serif text-lg text-darkGold font-bold uppercase leading-tight">...</h3>
      </div>
      <div class="bg-white dark:bg-zinc-900 p-5 rounded-[2rem] border border-satinGold/10 shadow-sm">
        <p class="text-[9px] font-bold text-satinGold uppercase tracking-widest mb-3 text-center">Progresso</p>
        <div class="relative h-16 w-16 mx-auto flex items-center justify-center">
          <svg class="w-full h-full transform -rotate-90">
            <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="4" fill="transparent" class="text-gray-100 dark:text-zinc-800"/>
            <circle id="progress-circle" cx="32" cy="32" r="28" stroke="url(#goldGradient)" stroke-width="4" fill="transparent" stroke-dasharray="175.9" stroke-dashoffset="175.9" class="transition-all duration-1000 ease-out"/>
            <defs>
              <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#C5A059"/>
                <stop offset="100%" stop-color="#A37E3B"/>
              </linearGradient>
            </defs>
          </svg>
          <span id="progress-percentage" class="absolute font-bold text-[11px]">0%</span>
        </div>
        <!-- Fase atual label -->
        <p id="fase-label" class="text-[8px] text-center font-bold text-satinGold uppercase tracking-widest mt-2 opacity-70"></p>
      </div>
      <div class="bg-white dark:bg-zinc-900 p-5 rounded-[2rem] border border-satinGold/10 shadow-sm flex flex-col justify-center items-center">
        <p class="text-[9px] font-bold text-satinGold uppercase tracking-widest mb-1">Eventos</p>
        <span id="event-count" class="font-serif text-3xl font-bold text-darkGold">0</span>
        <p class="text-[8px] opacity-50 uppercase font-bold mt-1">Registrados</p>
      </div>
    </div>

    <div id="timeline-container" class="relative border-l-2 border-satinGold/20 ml-3 pl-8 space-y-8"></div>
  </main>

  <script>
    const URL_API    = 'https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1';
    const URL_SESSAO = 'https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/verificar-sessao';

    let globalData   = [];
    let isLooping    = false;
    let scrollLocked = false;

    // ── Glossário Jurídico ────────────────────────────────────
    const GLOSSARIO = {
      'petição inicial':        'Documento formal que dá início ao processo judicial. É a primeira peça apresentada pelo advogado ao juiz, descrevendo os fatos, os direitos violados e os pedidos do cliente.',
      'citação':                'Ato pelo qual o réu (a parte contrária) é oficialmente comunicado da existência do processo e chamado a se defender. Sem a citação, o processo não avança.',
      'audiência de conciliação': 'Reunião promovida pelo juiz para tentar um acordo entre as partes antes do julgamento. É uma oportunidade de resolver o conflito de forma mais rápida e amigável.',
      'audiência de instrução':  'Etapa do processo em que são ouvidas as testemunhas e as partes. É nessa fase que o juiz coleta as provas para tomar sua decisão.',
      'sentença':                'Decisão final do juiz de primeira instância sobre o processo. Nela, o magistrado acolhe ou rejeita os pedidos feitos na Petição Inicial.',
      'execução':                'Fase em que a decisão judicial é efetivamente cumprida. Após ganhar o processo, o cliente passa a receber o que foi determinado pelo juiz.',
      'recurso':                 'Pedido formal para que uma instância superior revise a decisão do juiz. É utilizado quando uma das partes discorda da sentença proferida.',
      'prazo':                   'Período de tempo definido pela lei ou pelo juiz para que uma determinada ação seja realizada pelas partes ou pelo próprio tribunal.',
      'arquivamento':            'Encerramento definitivo do processo após o cumprimento de todas as obrigações. Significa que a causa foi totalmente resolvida.',
      'cálculos':                'Fase em que um perito ou contador calcula o valor exato a ser recebido pelo cliente, considerando juros, correção monetária e honorários.',
    };

    function abrirGlossario(termoKey) {
      const termo = termoKey;
      const def   = GLOSSARIO[termoKey.toLowerCase()] || 'Definição não disponível para este termo.';
      document.getElementById('glossario-termo').textContent = termo;
      document.getElementById('glossario-def').textContent   = def;
      document.getElementById('modal-glossario').classList.replace('hidden', 'flex');
    }

    function fecharGlossario() {
      document.getElementById('modal-glossario').classList.replace('flex', 'hidden');
    }

    // Detecta termos do glossário em um texto e retorna a chave encontrada (ou null)
    function detectarTermoGlossario(texto) {
      const lower = (texto || '').toLowerCase();
      return Object.keys(GLOSSARIO).find(k => lower.includes(k)) || null;
    }

    // ── Tabela de Fases ───────────────────────────────────────
    const FASES_LABEL = {
      10:  'Petição Inicial',
      30:  'Fase de Conhecimento',
      60:  'Sentença / Recursos',
      90:  'Execução / Cálculos',
      100: 'Processo Finalizado',
    };

    function getFaseLabel(pct) {
      // Encontra o label mais próximo
      const keys = Object.keys(FASES_LABEL).map(Number).sort((a,b)=>a-b);
      let closest = keys[0];
      for (const k of keys) { if (pct >= k) closest = k; }
      return FASES_LABEL[closest] || '';
    }

    // ── Utils ─────────────────────────────────────────────────
    function formatDateOnly(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
      } catch { return iso; }
    }

    async function logout() {
      try {
        await fetch(URL_API, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'logout' })
        });
      } catch { /* logout best-effort */ }
      window.location.href = 'index.html';
    }

    async function init() {
      try {
        const sessRes  = await fetch(URL_SESSAO, { method: 'GET', credentials: 'include' });
        const sessData = await sessRes.json();

        if (!sessData.autenticado || sessData.role !== 'cliente') {
          window.location.href = 'index.html';
          return;
        }

        const res  = await fetch(URL_API, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'timeline' })
        });
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById('client-name-display').textContent  = sessData.usuario || 'Usuário';
          document.getElementById('current-status-text').textContent  = 'Nenhum processo encontrado';
          return;
        }

        globalData = data;
        renderCarousel();

      } catch (err) {
        console.error('Erro init:', err);
        window.location.href = 'index.html';
      } finally {
        setTimeout(() => {
          const l = document.getElementById('globalLoader');
          if (l) l.style.display = 'none';
        }, 600);
      }
    }

    function renderCarousel() {
      const carousel      = document.getElementById('process-carousel');
      const dotsContainer = document.getElementById('carousel-dots');

      let displayData = [...globalData];
      if (globalData.length > 1) {
        displayData = [...globalData, ...globalData, ...globalData];
        isLooping = true;
        carousel.style.justifyContent = 'flex-start';
      } else {
        isLooping = false;
        carousel.style.justifyContent = 'center';
      }

      carousel.innerHTML = displayData.map((_, index) =>
        `<div class="process-card bg-white dark:bg-zinc-900 p-6 rounded-[2.5rem] shadow-md cursor-pointer"
              data-index="${index}" id="card-idx-${index}">
          <p class="text-[9px] font-bold text-satinGold uppercase tracking-widest _tipo"></p>
          <h4 class="font-serif font-bold text-darkGold text-sm mt-1 truncate _num"></h4>
          <div class="flex items-center gap-2 mt-4">
            <i class="fas fa-info-circle text-[10px] text-satinGold opacity-50"></i>
            <span class="text-[9px] font-bold opacity-40 uppercase _obs"></span>
          </div>
        </div>`
      ).join('');

      displayData.forEach((proc, index) => {
        const card = document.getElementById(`card-idx-${index}`);
        if (!card) return;
        card.querySelector('._tipo').textContent = proc.tipo_acao       || 'Processo';
        card.querySelector('._num').textContent  = proc.numero_processo || 'S/N';
        card.querySelector('._obs').textContent  = proc.obs             || 'Sem observações adicionais';
        card.dataset.id = String(proc.id);
      });

      document.querySelectorAll('.process-card').forEach(card => {
        let touchMoved = false;
        card.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
        card.addEventListener('touchmove',  () => { touchMoved = true;  }, { passive: true });
        card.addEventListener('touchend',   (e) => { if (!touchMoved) { e.preventDefault(); selectProcess(card.dataset.id); } });
        card.addEventListener('click',      ()  => selectProcess(card.dataset.id));
      });

      dotsContainer.innerHTML = globalData.map((_, i) => `<div class="dot" id="dot-${i}"></div>`).join('');

      if (isLooping) {
        scrollLocked = true;
        const cw = carousel.offsetWidth * 0.85 + 16;
        carousel.scrollLeft = globalData.length * cw;
        setTimeout(() => { scrollLocked = false; selectProcess(String(globalData[0].id)); }, 150);
      } else {
        setTimeout(() => selectProcess(String(globalData[0].id)), 50);
      }

      setupDraggableCarousel(carousel);
      setupCarouselScroll(carousel);
    }

    function setupCarouselScroll(carousel) {
      let t = null;
      carousel.addEventListener('scroll', () => {
        if (scrollLocked) return;
        if (isLooping) {
          const cw    = (document.querySelector('.process-card')?.offsetWidth || 0) + 16;
          const total = globalData.length * cw;
          if (carousel.scrollLeft <= 0) carousel.scrollLeft = total;
          else if (carousel.scrollLeft >= carousel.scrollWidth - carousel.offsetWidth) carousel.scrollLeft = carousel.scrollWidth - carousel.offsetWidth - total;
        }
        clearTimeout(t);
        t = setTimeout(() => {
          if (scrollLocked) return;
          let closest = null, minOff = Infinity;
          document.querySelectorAll('.process-card').forEach(card => {
            const r   = card.getBoundingClientRect();
            const off = Math.abs(r.left + r.width / 2 - window.innerWidth / 2);
            if (off < minOff) { minOff = off; closest = card; }
          });
          if (closest) selectProcess(closest.dataset.id);
        }, 80);
      });
    }

    function setupDraggableCarousel(slider) {
      let isDown = false, startX, scrollLeft;
      slider.addEventListener('mousedown',  e => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
      slider.addEventListener('mouseleave', ()  => { isDown = false; });
      slider.addEventListener('mouseup',    ()  => { isDown = false; });
      slider.addEventListener('mousemove',  e => {
        if (!isDown) return;
        const walk = e.pageX - slider.offsetLeft - startX;
        if (Math.abs(walk) > 5) { e.preventDefault(); slider.scrollLeft = scrollLeft - walk; }
      });
    }

    function selectProcess(id) {
      const idStr = String(id);
      const proc  = globalData.find(p => String(p.id) === idStr);
      if (!proc) return;

      document.getElementById('client-name-display').textContent = proc.cliente || 'Usuário';

      document.querySelectorAll('.process-card').forEach(card => {
        card.classList.toggle('active', card.dataset.id === idStr);
      });

      const actualIndex = globalData.findIndex(p => String(p.id) === idStr);
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === actualIndex));

      const atualizacoes = Array.isArray(proc.atualizacoes) ? proc.atualizacoes : [];
      const lastEvent    = atualizacoes[atualizacoes.length - 1] || { status: 'Nenhum' };

      document.getElementById('current-status-text').textContent = lastEvent.status;
      document.getElementById('event-count').textContent         = atualizacoes.length;

      // ── Progresso baseado em fase_atual (do info_processo) ──
      let pct = 10; // padrão
      try {
        const info = JSON.parse(proc.info_processo || '{}');
        if (info.fase_atual && !isNaN(parseInt(info.fase_atual))) {
          pct = Math.min(Math.max(parseInt(info.fase_atual), 0), 100);
        }
      } catch { /* mantém padrão */ }

      document.getElementById('progress-circle').style.strokeDashoffset =
        (2 * Math.PI * 28) * (1 - pct / 100);
      document.getElementById('progress-percentage').textContent = pct + '%';

      const faseLabel = document.getElementById('fase-label');
      if (faseLabel) faseLabel.textContent = getFaseLabel(pct);

      // ── Renderizar timeline via DOM — sem innerHTML de dados externos ──
      const container = document.getElementById('timeline-container');
      container.innerHTML = '';
      [...atualizacoes].reverse().forEach((ev, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'timeline-item relative bg-white dark:bg-zinc-900 p-6 rounded-[2rem] border border-satinGold/10 shadow-sm';
        wrap.style.animationDelay = `${i * 0.1}s`;

        const dot = document.createElement('div');
        dot.className = 'absolute -left-[41px] top-1/2 -translate-y-1/2 w-4 h-4 rounded-full gold-gradient border-4 border-pearl dark:border-softBlack shadow-sm';

        const pData = document.createElement('p');
        pData.className = 'text-[9px] font-bold text-satinGold uppercase mb-1 tracking-widest';
        pData.textContent = formatDateOnly(ev.data);

        // Header do status com botão de glossário
        const headerRow = document.createElement('div');
        headerRow.className = 'flex items-center gap-1 mb-2';

        const h5 = document.createElement('h5');
        h5.className = 'font-serif font-bold text-darkGold text-base uppercase';
        h5.textContent = ev.status || '';

        headerRow.appendChild(h5);

        // Verifica se o status tem termo no glossário
        const termoKey = detectarTermoGlossario(ev.status);
        if (termoKey) {
          const glossBtn = document.createElement('button');
          glossBtn.className = 'glossary-btn';
          glossBtn.textContent = '?';
          glossBtn.title = 'O que significa isso?';
          glossBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            abrirGlossario(termoKey);
          });
          headerRow.appendChild(glossBtn);
        }

        const pDesc = document.createElement('p');
        pDesc.className = 'text-xs opacity-70 leading-relaxed font-medium';
        pDesc.textContent = ev.descricao || 'Sem descrição.';

        wrap.append(dot, pData, headerRow, pDesc);
        container.appendChild(wrap);
      });
    }

    function toggleDarkMode() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ADV_GLOBAL_THEME', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key))) e.preventDefault();
    });

    // Fechar glossário clicando no backdrop
    document.getElementById('modal-glossario').addEventListener('click', function(e) {
      if (e.target === this) fecharGlossario();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const isDark = localStorage.getItem('ADV_GLOBAL_THEME') === 'dark';
      document.getElementById('themeIcon').classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
      init();
    });
  </script>
</body>
</html>
