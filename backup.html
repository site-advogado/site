<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Linha do Tempo | Gestão Jurídica</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>  
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    </script>  
    <style>  
        body { -webkit-user-select: none; user-select: none; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #process-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        #process-carousel::-webkit-scrollbar { display: none; }
        .process-card { flex: 0 0 85%; scroll-snap-align: center; transition: all 0.3s ease; border: 2px solid transparent; }
        .process-card.active { border-color: #C5A059; transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(197, 160, 89, 0.2); }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">  

<div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm uppercase">Sincronizando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <span class="font-serif font-bold text-darkGold uppercase">Área do Cliente</span>
    <button onclick="sessionStorage.clear(); location.href='index.html'" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-[10px] font-bold">SAIR</button>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <h2 class="font-serif text-2xl text-center text-darkGold uppercase mb-6">Meus Processos</h2>
    <div id="process-carousel" class="mb-8"></div>

    <div id="client-dashboard" class="grid grid-cols-2 gap-3 mb-10">
        <div class="col-span-2 bg-white dark:bg-zinc-800 p-6 rounded-[2rem] border border-satinGold/20 text-center">
            <p class="text-[10px] font-bold text-satinGold uppercase">Status Atual</p>
            <h2 id="client-main-status" class="text-xl font-serif text-darkGold font-bold uppercase">Aguardando...</h2>
        </div>
    </div>

    <div class="border-l-4 border-satinGold/30 pl-6 space-y-8" id="timeline-content"></div>  
</main>  

<script>
const URL_SCRIPT = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI"; 
const MASTER_API_KEY = "Adv_Seguro_2026_##";
let allProcessData = {}; 

function showLoading() { document.getElementById('globalLoader').style.display = 'flex'; }
function hideLoading() { document.getElementById('globalLoader').style.display = 'none'; }

async function carregarTimeline() {
    showLoading();
    const token = sessionStorage.getItem('ADV_AUTH_SESS');
    try {
        const response = await fetch(URL_SCRIPT, {
            method: 'POST',
            body: JSON.stringify({ api_key: MASTER_API_KEY, action: 'timeline', token: token })
        });
        const data = await response.json();
        if (Array.isArray(data) && data.length > 0) {
            allProcessData = data.reduce((acc, curr) => { acc[curr.numero_processo] = curr; return acc; }, {});
            renderCarousel();
            switchProcess(Object.keys(allProcessData)[0]);
        }
    } catch (e) { console.error(e); }
    finally { hideLoading(); }
}

function renderCarousel() {
    const carousel = document.getElementById('process-carousel');
    carousel.innerHTML = '';
    Object.values(allProcessData).forEach(proc => {
        const card = document.createElement('div');
        card.className = `process-card bg-white dark:bg-zinc-900 p-5 rounded-[2rem] shadow-lg cursor-pointer`;
        card.onclick = () => switchProcess(proc.numero_processo);
        card.innerHTML = `<p class="text-[9px] font-bold text-satinGold uppercase">${proc.tipo_acao}</p>
                          <h3 class="font-serif font-bold text-darkGold text-sm truncate uppercase">${proc.numero_processo}</h3>
                          <p class="text-[10px] mt-2 opacity-60">Toque para ver detalhes deste processo.</p>`;
        carousel.appendChild(card);
    });
}

function switchProcess(num) {
    const proc = allProcessData[num];
    document.getElementById('client-main-status').innerText = proc.atualizacoes[proc.atualizacoes.length-1]?.status || "Em andamento";
    const container = document.getElementById('timeline-content');
    container.innerHTML = '';
    [...proc.atualizacoes].reverse().forEach(ev => {
        container.innerHTML += `<div class="bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold mb-4">
            <p class="text-[10px] font-bold text-satinGold uppercase">${ev.data}</p>
            <h4 class="font-serif font-bold text-lg text-darkGold">${ev.status}</h4>
            <p class="text-sm opacity-80 mt-2">${ev.descricao}</p>
        </div>`;
    });
}

window.onload = carregarTimeline;
</script>
</body></html>
