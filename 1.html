<!DOCTYPE html>  
<html lang="pt-br" class="light">
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dra. Amanda Oliveira | Login</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>  
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
        if (localStorage.getItem('ADV_THEME') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        body { -webkit-user-select: none; user-select: none; }
        input { user-select: text !important; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }
    </style>
</head>

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Processando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">
    <div class="font-serif text-satinGold font-bold tracking-widest">ADVOCACIA</div>
    <button onclick="toggleDarkMode()" class="p-2"><i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i></button>
</header>

<main class="pt-32 pb-12 px-4 max-w-lg mx-auto">
    <section id="view-bio" class="text-center mb-12">
        <img id="bio-img" src="https://via.placeholder.com/150" class="w-32 h-32 mx-auto rounded-full border-4 border-satinGold shadow-xl mb-4 object-cover">
        <h1 id="bio-name" class="font-serif text-2xl font-bold text-darkGold uppercase">Dra. Amanda Oliveira</h1>
        <p id="bio-oab" class="text-xs opacity-60">OAB/MS 123.456</p>
    </section>

    <section class="bg-white dark:bg-zinc-900 p-8 rounded-[2rem] shadow-2xl border border-satinGold/10">
        <h3 class="font-serif text-xl mb-6 text-center tracking-wide">Acessar Processo</h3>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] uppercase font-bold text-satinGold tracking-widest">E-mail Cadastrado</label>
                <input type="email" id="searchEmail" placeholder="seu@email.com" class="w-full bg-transparent border-b-2 border-gray-200 dark:border-zinc-700 py-3 outline-none focus:border-satinGold transition-all">
            </div>
            <button onclick="handleLoginRequest()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.02] transition-transform text-xs tracking-widest">
                SOLICITAR ACESSO
            </button>
        </div>
    </section>
</main>

<div id="modalCode" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[2rem] p-8 border border-satinGold/30 text-center">
        <h3 class="font-serif text-lg text-darkGold uppercase mb-2">Verificação</h3>
        <p class="text-xs opacity-70 mb-6">Insira o código enviado para seu e-mail.</p>
        <input type="text" id="inputOtp" maxlength="6" placeholder="000000" class="w-full bg-transparent border-b-2 border-satinGold text-center text-3xl tracking-[0.3em] font-bold outline-none mb-8 dark:text-pearl">
        <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl mb-3 text-xs tracking-widest">VALIDAR</button>
        <button onclick="closeModal()" class="text-[10px] opacity-50 uppercase font-bold">Cancelar</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1";

    function showLoading() { document.getElementById('globalLoader').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('globalLoader').classList.add('hidden'); }

    async function handleLoginRequest() {
        const email = document.getElementById('searchEmail').value.trim();
        if (!email) return alert("Digite seu e-mail");

        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "login", usuario: email, passo: "solicitar" })
            });
            const data = await res.json();
            if (data.status === "codigo_enviado") {
                document.getElementById('modalCode').classList.remove('hidden');
                document.getElementById('modalCode').classList.add('flex');
            } else {
                alert(data.message || "Usuário não localizado.");
            }
        } catch (e) { alert("Erro de conexão."); }
        finally { hideLoading(); }
    }

    async function confirmCode() {
        const email = document.getElementById('searchEmail').value.trim();
        const code = document.getElementById('inputOtp').value.trim();
        showLoading();
        try {
            const res = await fetch(URL_SCRIPT, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "login", usuario: email, codigo: code, passo: "verificar" })
            });
            const data = await res.json();
            if (data.status === "ok") {
                sessionStorage.setItem('ADV_AUTH_SESS', 'true');
                sessionStorage.setItem('CLIENT_EMAIL', email);
                window.location.href = "timeline.html"; // NOME DA SUA SEGUNDA PÁGINA
            } else {
                alert("Código incorreto.");
            }
        } catch (e) { alert("Erro na validação."); }
        finally { hideLoading(); }
    }

    function closeModal() { document.getElementById('modalCode').classList.add('hidden'); }
    
    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('ADV_THEME', isDark ? 'dark' : 'light');
    }
</script>
</body>
</html>
