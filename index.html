    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') {

    } else {
        document.documentElement.classList.add('light');

    <style>  
/* Bloqueia a seleção de texto e o arraste de imagens */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* Mantém os campos de texto funcionando */

            width: 40px;
            height: 40px;

            0% { transform: rotate(0deg); }

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Verificando...</p>

</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <button id="installApp" class="hidden bg-satinGold hover:bg-darkGold text-white px-4 py-2 rounded-full text-[10px] font-bold transition-all shadow-lg animate-bounce">  
        <i class="fas fa-download mr-2"></i>BAIXAR APP  
    </button>  
    <div class="flex gap-4 items-center ml-auto">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">  
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>  
        </button>  
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  

    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6">  
            <img id="bio-img" src="" alt="" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl">  
        </div>  
        <h1 id="bio-name" class="font-serif text-3xl font-bold tracking-widest text-darkGold mb-1 uppercase">Carregando...</h1>  
        <p id="bio-oab" class="text-sm font-semibold opacity-70 mb-3">OAB/MS 000.000</p>  
        <p id="bio-desc" class="text-sm italic px-4 mb-5 max-w-sm mx-auto">Sincronizando dados...</p>  
      
        <div class="flex justify-center gap-6 text-satinGold text-3xl">  
            <a id="bio-phone" href="#" target="_blank"><i class="fab fa-whatsapp hover:scale-110 transition-transform"></i></a>  
            <a id="bio-email" href="#"><i class="fas fa-envelope hover:scale-110 transition-transform"></i></a>  
        </div>
    </section>  

    <section id="view-client-search" class="bg-white dark:bg-zinc-900 p-10 rounded-[30px] shadow-xl border border-satinGold/10">  
        <h3 class="font-serif text-2xl mb-8 text-center text-softBlack dark:text-pearl tracking-wide">Consultar meu Processo</h3>  
        <div class="space-y-6">  
            <div>  
                <label class="text-xs uppercase font-bold text-satinGold tracking-wider">Reclamante</label>  
                <input type="email" id="searchCpf" autocomplete="username" placeholder="E-mail" class="w-full bg-transparent border-b-2 border-gray-300 dark:border-zinc-700 py-3 outline-none focus:border-satinGold transition-all text-base">  
            </div>  
            <button onclick="handleClientSearch()" id="btnSearch" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.03] transition-transform tracking-wider text-sm">  
                ACESSAR LINHA DO TEMPO  
            </button>

</main>  

<div id="modalCode" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-8 border border-satinGold/30 shadow-2xl scale-95 transition-transform text-center">
        <h3 class="font-serif text-xl mb-2 text-darkGold uppercase tracking-wider">Verificação</h3>
        <p class="text-base mb-2 opacity-70">Insira o código de 6 dígitos para acessar.</p>
        <div id="timerContainer" class="text-center mb-6">
            <span class="text-xs font-bold text-satinGold bg-satinGold/10 px-3 py-1 rounded-full" id="timerLabel">Expira em: <span id="timer">03:00</span></span>
        </div>
        <input type="text" id="inputOtp" maxlength="6" placeholder="000000" class="w-full bg-transparent border-b-2 border-satinGold text-center text-2xl tracking-[0.5em] font-bold outline-none py-2 mb-8 dark:text-pearl">
        <div class="flex flex-col gap-3">
            <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl shadow-md hover:scale-[1.03] transition-transform text-sm tracking-widest uppercase">Validar Acesso</button>
            <button onclick="closeModal()" class="w-full py-2 text-xs font-bold opacity-50 hover:opacity-100 uppercase tracking-tighter">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalError" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-10 border border-satinGold/40 shadow-2xl scale-95 transition-transform text-center">
        <div class="w-16 h-16 border-2 border-satinGold text-satinGold rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-info text-2xl"></i>
        </div>
        <h3 class="font-serif text-xl mb-3 text-darkGold uppercase tracking-widest">Aviso</h3>
        <p id="errorMessage" class="text-sm opacity-80 mb-10 leading-relaxed">Este e-mail não está autorizado a acessar o sistema.</p>
        <button onclick="closeErrorModal()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg text-xs tracking-[0.2em] uppercase hover:scale-[1.02] transition-transform">Entendido</button>
    </div>
</div>


<script>

const _0x4a21 = ["v1", "api", "dev", "workers", "siterefrigeracaoeliezer", "api-advogada"];
const URL_SCRIPT = `https://${_0x4a21[5]}.${_0x4a21[4]}.${_0x4a21[3]}.${_0x4a21[2]}/${_0x4a21[1]}/${_0x4a21[0]}`;

let countdownInterval;
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installApp').classList.remove('hidden');
    document.getElementById('installApp').classList.add('flex');
});

document.getElementById('installApp')?.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            document.getElementById('installApp').classList.add('hidden');
        }
        deferredPrompt = null;
    }
});

function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

function openAdminModal(data) {
    let container = document.getElementById('admin-wrapper');
    if (!container) {
        container = document.createElement('div');
        container.id = 'admin-wrapper';
        document.body.appendChild(container);
    }
    container.innerHTML = data.html;
    document.getElementById('modalAdmin').classList.remove('hidden');
    document.getElementById('modalAdmin').classList.add('flex');
}

function closeAdminModal() {
    const modal = document.getElementById('modalAdmin');
    if (modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.getElementById('admin-wrapper').remove();
    }
}

async function realizarLoginAdmin() {
    const user = document.getElementById('adminUser').value.replace(/\s+/g, '').toLowerCase();
    const pass = document.getElementById('adminPass').value;
    if(!user) return alert("Preencha o usuário.");

    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: user, senha: pass })
        });
        const data = await response.json();
        if(data.status === "sucesso") {
            sessionStorage.setItem('ADV_AUTH_SESS', 'true');
            setTimeout(() => { window.location.href = "configuracao.html"; }, 500);
        } else {
            alert(data.message || "Acesso negado.");
        }
    } catch (e) { alert("Erro de conexão."); }
    finally { hideLoading(); }
}

window.onload = () => { 
    const themeIcon = document.getElementById('themeIcon');
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') {
        document.documentElement.classList.add('dark');
        if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
    } else {
        document.documentElement.classList.remove('dark');
        if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
    }

    fetchBio(); 
    sessionStorage.removeItem('ADV_SESSION_TOKEN'); 
    sessionStorage.removeItem('ADV_AUTH_SESS');
};  

function fetchBio() {  
    showLoading();
    fetch(URL_SCRIPT, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "bio" })
    })  
    .then(res => res.json())  
    .then(data => {  
        document.getElementById('bio-name').textContent = data.name || "Sincronização falhou";  
        document.getElementById('bio-oab').textContent = data.oab || "OAB/MS 000.000";  
        document.getElementById('bio-desc').textContent = data.desc || "Sincronização falhou";  
        document.getElementById('bio-img').src = data.img || "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1IjT2nCz0Dys2W4VT0W8lx-33HilagMdDzPaWJBMy0GMAWB_yrlNZD4ivqjH3VYrgWr15AL0GLpXrXcZnwZbzgSe5Mx84ola8GJuKrPmGG2_pF2wAz3EcnyYksEXJ2NQSRQRbT4s0eqmUyrCBnpiJJrffg4BPtl3lAKji0RK-PprhQDyyz_1ccPP3EMBU/s320/logo.png";  
        const cleanPhone = (data.phone || "").toString().replace(/\D/g, '');  
        document.getElementById('bio-phone').href = `https://wa.me/55${cleanPhone}`;  
        document.getElementById('bio-email').href = `mailto:${data.email}`;  
    }).finally(() => hideLoading());
}  

async function handleClientSearch() {  
    const inputUsuario = document.getElementById('searchCpf').value.trim();  
    if (!inputUsuario) return showErrorModal("Por favor, preencha o campo.");  

    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST",
            credentials: "include", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: inputUsuario, passo: "solicitar" })
        });
        const data = await response.json();
        if (data.status === "abrir_modal_admin") {
            openAdminModal(data);
        } else if (data.status === "codigo_enviado") {
            openModal();
        } else {
            showErrorModal(data.message || "Usuário não encontrado.");
        }
    } catch (e) { showErrorModal("Erro na comunicação."); }
    finally { hideLoading(); }
}

function startTimer(duration) {
    let remaining = duration;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
            clearInterval(countdownInterval);
            document.getElementById('timerLabel').textContent = "CÓDIGO EXPIRADO";
            return;
        }
        let minutes = Math.floor(remaining / 60);
        let seconds = remaining % 60;
        document.getElementById('timer').textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }, 1000);
}

function openModal() {
    document.getElementById('modalCode').classList.replace('hidden', 'flex');
    startTimer(180); 
}

function closeModal() {
    document.getElementById('modalCode').classList.replace('flex', 'hidden');
    clearInterval(countdownInterval);
}

async function confirmCode() {
    const code = document.getElementById('inputOtp').value.trim();
    const email = document.getElementById('searchCpf').value.trim();
    showLoading();
    try {
        const res = await fetch(URL_SCRIPT, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "login", usuario: email, codigo: code, passo: "verificar" })
        });
        const data = await res.json();
        if (data.status === "ok") {
            closeModal();
            localStorage.setItem('ADV_USER_EMAIL', email);
            window.location.href = "linha-tempo.html";
        } else {
            showErrorModal(data.message || "Código inválido.");
        }
    } catch(e) { showErrorModal("Erro na conexão."); }
    finally { hideLoading(); }
}

function showErrorModal(msg) {
    document.getElementById('errorMessage').textContent = msg;
    document.getElementById('modalError').classList.replace('hidden', 'flex');
}

function closeErrorModal() { document.getElementById('modalError').classList.replace('flex', 'hidden'); }

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    const themeIcon = document.getElementById('themeIcon');
    
    if (isDark) {
        localStorage.setItem('ADV_GLOBAL_THEME', 'dark');
        if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
    } else {
        localStorage.setItem('ADV_GLOBAL_THEME', 'light');
        if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
    }
}
</script>
</body>
