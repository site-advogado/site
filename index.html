<!DOCTYPE html>  
<html lang="pt-br" class="light">
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dra. Nome da Advogada | Gestão Processual</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>  
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    </script>  
    <style>  
        body { user-select: none; }
        .modal-blur { backdrop-filter: blur(8px); }  
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans">  

<div id="globalLoader" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Verificando...</p>
    </div>
</div>

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6">  
            <img id="bio-img" src="https://via.placeholder.com/150" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl">  
        </div>  
        <h1 id="bio-name" class="font-serif text-3xl font-bold tracking-widest text-darkGold mb-1 uppercase">Dra. Advogada</h1>  
        <p id="bio-desc" class="text-sm italic px-4 mb-5 max-w-sm mx-auto">Excelência em Gestão Jurídica.</p>  
    </section>  

    <section class="bg-white dark:bg-zinc-900 p-10 rounded-[30px] shadow-xl border border-satinGold/10">  
        <h3 class="font-serif text-2xl mb-8 text-center text-softBlack dark:text-pearl">Acessar Painel do Cliente</h3>  
        <div class="space-y-6">  
            <div>  
                <label class="text-xs uppercase font-bold text-satinGold">Seu E-mail Cadastrado</label>  
                <input type="email" id="searchEmail" placeholder="exemplo@email.com" class="w-full bg-transparent border-b-2 border-gray-300 py-3 outline-none focus:border-satinGold dark:text-white transition-all">  
            </div>  
            <button onclick="handleClientSearch()" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:scale-105 transition-all">  
                SOLICITAR ACESSO  
            </button>  
        </div>  
    </section>  
</main>  

<div id="modalCode" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-8 border border-satinGold/30 shadow-2xl text-center">
        <h3 class="font-serif text-xl mb-2 text-darkGold uppercase">Verificação</h3>
        <p class="text-sm mb-6 opacity-70">Insira o código enviado ao seu e-mail.</p>
        <input type="text" id="inputOtp" maxlength="6" placeholder="000000" class="w-full bg-transparent border-b-2 border-satinGold text-center text-2xl tracking-[0.5em] font-bold outline-none py-2 mb-8 dark:text-pearl">
        <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl uppercase">Validar Código</button>
    </div>
</div>

<script>
const URL_SCRIPT = "SUA_URL_DO_SCRIPT_AQUI"; // COLE A URL DO SEU SCRIPT GOOGLE APPS
const MASTER_API_KEY = "Adv_Seguro_2026_##";

function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

async function handleClientSearch() {  
    const email = document.getElementById('searchEmail').value.trim();  
    if (!email) return alert("Preencha o e-mail.");  

    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST",
            body: JSON.stringify({ action: "login", usuario: email, passo: "solicitar", api_key: MASTER_API_KEY })
        });
        const data = await response.json();
        if (data.status === "codigo_enviado") {
            document.getElementById('modalCode').classList.replace('hidden', 'flex');
        } else {
            alert(data.message || "E-mail não encontrado.");
        }
    } catch (e) { alert("Erro de conexão."); }
    finally { hideLoading(); }
}

async function confirmCode() {
    const code = document.getElementById('inputOtp').value.trim();
    const email = document.getElementById('searchEmail').value.trim();
    showLoading();
    try {
        const res = await fetch(URL_SCRIPT, {
            method: "POST",
            body: JSON.stringify({ action: "login", usuario: email, codigo: code, passo: "verificar", api_key: MASTER_API_KEY })
        });
        const data = await res.json();
        if (data.status === "ok") {
            sessionStorage.setItem('ADV_AUTH_SESS', data.token);
            window.location.href = "cliente.html"; // Nome da sua página do cliente
        } else { alert("Código inválido."); }
    } catch(e) { alert("Erro na conexão."); }
    finally { hideLoading(); }
}
</script>
</body>  
</html>
