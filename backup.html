<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Minha Linha do Tempo | Gestão Jurídica</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    <script>  
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { pearl: '#FDFCF8', softBlack: '#1A1A1A', satinGold: '#C5A059', darkGold: '#A37E3B' }, fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Montserrat', 'sans-serif'] } } } }
    
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
    } else {
        document.documentElement.classList.add('light');
        document.documentElement.classList.remove('dark');
    }
    </script>  
    <style>  
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        img { pointer-events: none !important; -webkit-user-drag: none !important; }
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #C5A059; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
        .carousel-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 20px; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .process-card { min-width: 85%; scroll-snap-align: center; }
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<div id="globalLoader" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl flex flex-col items-center">
        <div class="loader mb-4"></div>
        <p class="text-satinGold font-bold text-sm tracking-widest uppercase">Sincronizando...</p>
    </div>
</div>

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <div class="flex items-center gap-2">
        <div class="w-8 h-8 gold-gradient rounded-full flex items-center justify-center text-white shadow-md"><i class="fas fa-user-shield text-xs"></i></div>
        <span class="font-serif font-bold text-darkGold tracking-widest text-xs uppercase">Área do Cliente</span>
    </div>
    <div class="flex gap-4 items-center">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all"><i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i></button>  
        <button onclick="sairTimeline()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-full text-[10px] font-bold uppercase">Sair</button>
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  
    
    <section id="carousel-section" class="mb-8 hidden">
        <h3 class="font-serif text-sm font-bold text-darkGold uppercase mb-4 tracking-widest">Seus Processos</h3>
        <div id="process-carousel" class="carousel-container"></div>
    </section>

    <section id="progress-section" class="mb-10 bg-white dark:bg-zinc-800 p-6 rounded-3xl shadow-lg border border-satinGold/10">
        <div class="flex justify-between items-end mb-2">
            <span class="text-[10px] font-bold uppercase tracking-widest text-satinGold">Progresso do Caso</span>
            <span id="progress-percent" class="font-serif font-bold text-darkGold">0%</span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 h-2 rounded-full overflow-hidden">
            <div id="progress-bar" class="gold-gradient h-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <p id="progress-label" class="text-[9px] mt-2 opacity-60 uppercase text-center">Analisando estágio atual...</p>
    </section>

    <section class="text-center mb-10">
        <h2 class="font-serif text-2xl font-bold text-darkGold uppercase tracking-tighter">Movimentações</h2>
    </section>
    <div class="border-l-4 border-satinGold/30 pl-6 ml-2 space-y-8" id="timeline-content"></div>  
</main>  

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.ctrlKey && e.key === "u") || (e.ctrlKey && e.shiftKey && e.key === "J") || (e.ctrlKey && e.shiftKey && e.key === "C")) {
        e.preventDefault();
        return false;
    }
});

const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev/api/v1"; 

if (!sessionStorage.getItem('ADV_AUTH_SESS')) {
    window.location.href = "index.html";
}

function showLoading() { document.getElementById('globalLoader').style.display = 'flex'; }
function hideLoading() { document.getElementById('globalLoader').style.display = 'none'; }

window.onload = () => { 
    const themeIcon = document.getElementById('themeIcon');
    if (localStorage.getItem('ADV_GLOBAL_THEME') === 'dark') {
        document.documentElement.classList.add('dark');
        if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
    } else {
        document.documentElement.classList.remove('dark');
        if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
    }
    
    setTimeout(carregarTimeline, 400); 
};

async function carregarTimeline() {
    showLoading();
    try {
        const response = await fetch(URL_SCRIPT, {
            method: "POST", credentials: "include", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "timeline", token: sessionStorage.getItem('ADV_AUTH_SESS') })
        });
        const data = await response.json();
        if (data.status === "expirado") sairTimeline();
        else {
            renderCarousel(data);
            renderTimeline(data);
            updateClientMetrics(data);
        }
    } catch (e) { sairTimeline(); } finally { hideLoading(); }
}

function renderCarousel(eventos) {
    const section = document.getElementById('carousel-section');
    const container = document.getElementById('process-carousel');
    
    // Simulação de múltiplos processos para visualização conforme solicitado
    const processosSimulados = [
        { id: '1', tipo: 'Trabalhista', numero: '0010234-55.2024.5.15.0001' },
        { id: '2', tipo: 'Cível', numero: '1002345-12.2023.8.26.0100' }
    ];

    section.classList.remove('hidden');
    container.innerHTML = '';
    
    processosSimulados.forEach(proc => {
        container.innerHTML += `
            <div class="process-card bg-white dark:bg-zinc-800 p-5 rounded-3xl shadow-xl border border-satinGold/20 flex flex-col justify-between">
                <div>
                    <span class="bg-satinGold/10 text-satinGold text-[9px] px-2 py-1 rounded-full font-bold uppercase">${proc.tipo}</span>
                    <h4 class="font-serif text-darkGold font-bold mt-2">${proc.numero}</h4>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <span class="text-[10px] opacity-50">Toque para selecionar</span>
                    <i class="fas fa-chevron-right text-satinGold text-xs"></i>
                </div>
            </div>`;
    });
}

function updateClientMetrics(eventos) {
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    const progressLabel = document.getElementById('progress-label');
    
    if (!eventos || eventos.length === 0) return;

    const ultimoStatus = eventos[eventos.length - 1].status.toLowerCase();
    let porcentagem = 10;
    let legenda = "Fase Inicial";

    if (ultimoStatus.includes("petição") || ultimoStatus.includes("inicial")) {
        porcentagem = 20;
        legenda = "Processo Protocolado";
    } else if (ultimoStatus.includes("audiência") || ultimoStatus.includes("conciliação")) {
        porcentagem = 50;
        legenda = "Fase de Instrução";
    } else if (ultimoStatus.includes("sentença") || ultimoStatus.includes("decisão")) {
        porcentagem = 85;
        legenda = "Fase de Decisão";
    } else if (ultimoStatus.includes("finalizado") || ultimoStatus.includes("arquivado") || ultimoStatus.includes("pago")) {
        porcentagem = 100;
        legenda = "Caso Concluído";
    }

    progressBar.style.width = `${porcentagem}%`;
    progressPercent.innerText = `${porcentagem}%`;
    progressLabel.innerText = legenda;
}

function renderTimeline(eventos) {
    const container = document.getElementById('timeline-content');
    container.innerHTML = '';
    
    [...eventos].reverse().forEach((ev, index) => {
        const isFirst = index === 0;
        container.innerHTML += `
            <div class="relative ${isFirst ? 'scale-105' : 'opacity-80'} transition-all duration-500">
                <div class="absolute -left-[31px] top-2 w-4 h-4 rounded-full border-2 border-pearl dark:border-softBlack ${isFirst ? 'bg-satinGold shadow-[0_0_10px_#C5A059]' : 'bg-gray-400'}"></div>
                <div class="bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold relative">
                    <div class="absolute top-4 -left-2 w-4 h-4 bg-white dark:bg-zinc-800 rotate-45 border-l border-b border-satinGold/10"></div>
                    <p class="text-[10px] font-bold text-satinGold uppercase mb-1">${ev.data || ''}</p>
                    <h4 class="font-serif font-bold text-lg text-darkGold leading-tight">${ev.status || ''}</h4>
                    <p class="text-sm opacity-80 mt-2 leading-relaxed">${ev.descricao || 'O status do seu processo foi atualizado. Clique para ver detalhes.'}</p>
                </div>
            </div>`;
    });
}

function sairTimeline() { sessionStorage.removeItem('ADV_AUTH_SESS'); window.location.href = "index.html"; }

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    const themeIcon = document.getElementById('themeIcon');
    
    if (isDark) {
        localStorage.setItem('ADV_GLOBAL_THEME', 'dark');
        if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
    } else {
        localStorage.setItem('ADV_GLOBAL_THEME', 'light');
        if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
    }
}
</script>
</body>  
</html>
