<!DOCTYPE html>  
<html lang="pt-br" class="light">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Dra. Nome da Advogada | Gestão Processual</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">  
    
    <script>  
    tailwind.config = {  
        darkMode: 'class',  
        theme: {  
            extend: {  
                colors: {  
                    pearl: '#FDFCF8',  
                    softBlack: '#1A1A1A',  
                    satinGold: '#C5A059',  
                    darkGold: '#A37E3B'  
                },  
                fontFamily: {  
                    serif: ['Cinzel', 'serif'],  
                    sans: ['Montserrat', 'sans-serif'],  
                }  
            }  
        }  
    }  
    </script>  

    <style>  
        .timeline-line::before {  
            content: '';  
            position: absolute;  
            left: 20px;  
            top: 0;  
            bottom: 0;  
            width: 2px;  
            background: #C5A059;  
            opacity: 0.3;  
        }  
        .modal-blur { backdrop-filter: blur(8px); }  
        .gold-gradient { background: linear-gradient(135deg, #C5A059 0%, #A37E3B 100%); }  
        .finished-card { filter: grayscale(1); opacity: 0.7; border-color: #666 !important; }  
    </style>
</head>  

<body class="bg-pearl dark:bg-softBlack text-softBlack dark:text-pearl min-h-screen font-sans transition-colors duration-300">  

<header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-pearl/80 dark:bg-softBlack/80 backdrop-blur-md border-b border-satinGold/20">  
    <button id="installApp" class="hidden bg-satinGold hover:bg-darkGold text-white px-4 py-2 rounded-full text-xs font-bold transition-all shadow-lg animate-bounce">  
        <i class="fas fa-download mr-2"></i>INSTALAR APP  
    </button>  
    <div class="flex gap-4 items-center ml-auto">  
        <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-all">  
            <i id="themeIcon" class="fas fa-moon text-satinGold text-xl"></i>  
        </button>  
    </div>
</header>  

<main class="pt-28 pb-12 px-4 max-w-lg mx-auto">  

    <section id="view-bio" class="text-center mb-16">  
        <div class="w-48 h-48 mx-auto mb-6">  
            <img id="bio-img" src="" alt="" class="rounded-full w-full h-full object-cover border-[6px] border-satinGold shadow-2xl">  
        </div>  
        <h1 id="bio-name" class="font-serif text-3xl font-bold tracking-widest text-darkGold mb-1 uppercase">Carregando...</h1>  
        <p id="bio-oab" class="text-sm font-semibold opacity-70 mb-3">OAB/MS 000.000</p>  
        <p id="bio-desc" class="text-sm italic px-4 mb-5 max-w-sm mx-auto">Sincronizando dados...</p>  
      
        <div class="flex justify-center gap-6 text-satinGold text-lg">  
            <a id="bio-phone" href="#" target="_blank"><i class="fab fa-whatsapp hover:scale-110 transition-transform"></i></a>  
            <a id="bio-email" href="#"><i class="fas fa-envelope hover:scale-110 transition-transform"></i></a>  
        </div>
    </section>  

    <section id="view-client-search" class="bg-white dark:bg-zinc-900 p-10 rounded-[30px] shadow-xl border border-satinGold/10">  
        <h3 class="font-serif text-2xl mb-8 text-center text-softBlack dark:text-pearl tracking-wide">Consultar meu Processo</h3>  
        <div class="space-y-6">  
            <div>  
                <label class="text-xs uppercase font-bold text-satinGold tracking-wider">Reclamante</label>  
                <input type="email" id="searchCpf" autocomplete="username" placeholder="E-mail" class="w-full bg-transparent border-b-2 border-gray-300 dark:border-zinc-700 py-3 outline-none focus:border-satinGold transition-all text-base">  
            </div>  
            <button onclick="handleClientSearch()" id="btnSearch" class="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg hover:scale-[1.03] transition-transform tracking-wider text-sm">  
                ACESSAR LINHA DO TEMPO  
            </button>  
        </div>  
    </section>  

    <section id="view-timeline" class="hidden space-y-6">  
        <button onclick="showView('view-client-search')" class="text-satinGold font-bold text-sm mb-4"><i class="fas fa-arrow-left mr-2"></i>Voltar</button>  
        <div id="timeline-status-info" class="text-center hidden p-4 rounded-xl bg-gray-200 dark:bg-zinc-800 mb-4 italic text-sm">Este processo foi finalizado.</div>  
        <div class="border-l-4 border-satinGold pl-6 ml-2 space-y-8" id="timeline-content"></div>  
    </section>  

</main>  

<div id="modalCode" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-blur bg-black/40">
    <div class="bg-pearl dark:bg-zinc-900 w-full max-w-sm rounded-[30px] p-8 border border-satinGold/30 shadow-2xl scale-95 transition-transform">
        <h3 class="font-serif text-xl text-center mb-2 text-darkGold uppercase tracking-wider">Verificação</h3>
        <p class="text-xs text-center mb-6 opacity-70">Insira o código de 6 dígitos enviado ao seu e-mail.</p>
        <input type="text" id="inputOtp" maxlength="6" placeholder="000000" class="w-full bg-transparent border-b-2 border-satinGold text-center text-2xl tracking-[0.5em] font-bold outline-none py-2 mb-8 dark:text-pearl">
        <div class="flex flex-col gap-3">
            <button onclick="confirmCode()" class="w-full gold-gradient text-white font-bold py-3 rounded-xl shadow-md text-sm tracking-widest uppercase">Validar Acesso</button>
            <button onclick="closeModal()" class="w-full py-2 text-xs font-bold opacity-50 hover:opacity-100 uppercase tracking-tighter">Cancelar</button>
        </div>
    </div>
</div>

<script>  

const URL_SCRIPT = "https://api-advogada.siterefrigeracaoeliezer.workers.dev"; 

let SESSION_TOKEN = null;
let CURRENT_IP = "0.0.0.0";
let ATTEMPTS_COUNT = 0;
const MAX_ATTEMPTS = 5;

async function getClientIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
    } catch (e) {
        return "0.0.0.0";
    }
}

window.onload = () => { fetchBio(); };  

function fetchBio() {  
    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "bio" })
    })  
    .then(res => res.json())  
    .then(data => {  
        document.getElementById('bio-name').innerText = data.name || "Nome não definido";  
        document.getElementById('bio-oab').innerText = data.oab || "";  
        document.getElementById('bio-desc').innerText = data.desc || "";  
        document.getElementById('bio-img').src = data.img || "https://via.placeholder.com/150";  
        const cleanPhone = (data.phone || "").toString().replace(/\D/g, '');  
        document.getElementById('bio-phone').href = `https://wa.me/55${cleanPhone}`;  
        document.getElementById('bio-email').href = `mailto:${data.email}`;  
    }).catch(err => console.error("Erro Bio:", err));
}  

async function handleClientSearch() {  
    if (ATTEMPTS_COUNT >= MAX_ATTEMPTS) {
        return alert("Muitas tentativas. Por favor, recarregue a página em alguns minutos.");
    }

    const inputUsuario = document.getElementById('searchCpf').value.trim();  
    const btn = document.getElementById('btnSearch');
    
    if (!inputUsuario) return alert("Por favor, preencha o campo.");  

    btn.innerText = "VERIFICANDO...";
    btn.disabled = true;

    CURRENT_IP = await getClientIP();

    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "login",
            usuario: inputUsuario,
            passo: "solicitar",
            ip: CURRENT_IP 
        })
    })
    .then(res => res.json())
    .then(response => {
        if (response.status === "admin") {
            window.location.href = response.redirect;
        } else if (response.status === "codigo_enviado") {
            openModal();
        } else {
            ATTEMPTS_COUNT++;
            alert(response.message || "Dados incorretos.");
        }
    })
    .catch(() => alert("Erro na conexão."))
    .finally(() => {
        btn.innerText = "ACESSAR LINHA DO TEMPO";
        btn.disabled = false;
    });
}  

function openModal() {
    document.getElementById('modalCode').classList.remove('hidden');
    document.getElementById('modalCode').classList.add('flex');
    document.getElementById('inputOtp').focus();
}

function closeModal() {
    document.getElementById('modalCode').classList.add('hidden');
    document.getElementById('modalCode').classList.remove('flex');
    document.getElementById('inputOtp').value = '';
}

async function confirmCode() {
    const code = document.getElementById('inputOtp').value.trim();
    const email = document.getElementById('searchCpf').value.trim();
    
    if (code.length < 6) return alert("Digite o código completo.");

    const resVerificar = await fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "login",
            usuario: email,
            codigo: code,
            passo: "verificar",
            ip: CURRENT_IP
        })
    });
    const dataFinal = await resVerificar.json();

    if (dataFinal.status === "ok") {
        SESSION_TOKEN = dataFinal.token;
        closeModal();
        carregarTimeline();
    } else {
        ATTEMPTS_COUNT++;
        alert(dataFinal.message || "Código inválido.");
    }
}

async function carregarTimeline() {
    const ipValidacao = await getClientIP();

    fetch(URL_SCRIPT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "timeline",
            token: SESSION_TOKEN,
            ip: ipValidacao 
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "expirado") {
            alert("Sessão expirada. Faça login novamente.");
            showView('view-client-search');
        } else if (data.status === "erro") {
            alert("Sessão inválida ou erro de segurança.");
            showView('view-client-search');
        } else {
            renderTimeline(data);
            showView('view-timeline');
        }
    });
}

function renderTimeline(eventos) {  
    const container = document.getElementById('timeline-content');  
    container.innerHTML = '';  
    
    if (!Array.isArray(eventos) || eventos.length === 0) {
        container.innerHTML = '<p class="text-center opacity-50">Nenhuma atualização encontrada.</p>';
        return;
    }

    const isFinalizado = eventos.some(e => e.status === "Processo Finalizado");
    document.getElementById('timeline-status-info').classList.toggle('hidden', !isFinalizado);  
    
    [...eventos].reverse().forEach(ev => {  
        container.innerHTML += `  
            <div class="relative bg-white dark:bg-zinc-800 p-5 rounded-2xl shadow-md border-l-4 border-satinGold">  
                <p class="text-[10px] font-bold text-satinGold uppercase mb-1">${ev.data || ''}</p>  
                <h4 class="font-serif font-bold text-lg">${ev.status || ''}</h4>  
                <p class="text-sm opacity-80 mt-2">${ev.descricao || ''}</p>  
            </div>`;  
    });  
}  

function showView(viewId) {  
    ['view-client-search', 'view-timeline'].forEach(v => document.getElementById(v).classList.add('hidden'));  
    document.getElementById(viewId).classList.remove('hidden');  
}  

function toggleDarkMode() { 
    document.documentElement.classList.toggle('dark'); 
}  

</script>

</body>  
</html>
